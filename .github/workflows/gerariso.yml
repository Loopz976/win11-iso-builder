name: windows-11-iso-builder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install deps
      shell: powershell
      run: |
        choco install aria2 -y
        choco install 7zip -y

    # =========================
    # WORKDIR
    # =========================
    - name: Prepare workspace
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path work -Force

    # =========================
    # BASE
    # =========================
    - name: Download base
      shell: powershell
      run: |
        cd work
        aria2c -o base.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.001
        aria2c -o base.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.002
        aria2c -o base.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.003

    - name: Extract base
      shell: powershell
      run: |
        cd work
        7z x base.7z.001 -oout -y

    # =========================
    # INI
    # =========================
    - name: Create W10UI.ini
      shell: powershell
      run: |
        @"
AutoStart=1
AddUpdates=1
AddDrivers=1
Cleanup=1
ResetBase=1
Wim2ESD=1
Convert=1
Format=ESD
Compression=recovery
Drv_Source=Drivers\OS
"@ | Out-File -Encoding ASCII "work\out\Files\W10UI.ini"

    # =========================
    # UUP (SEU CÓDIGO FUNCIONAL)
    # =========================
    - name: Extract UUP
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path uup -Force

        $zip = Get-ChildItem -Filter *.zip | Select-Object -First 1

        if (!$zip) { exit 1 }

        7z x $zip.FullName -ouup -y

        if (!(Test-Path "uup\uup_download_windows.cmd")) {
          exit 1
        }

    - name: Prepare aria2
      shell: powershell
      run: |
        $aria = (Get-Command aria2c).Source
        New-Item -ItemType Directory -Path "uup\files" -Force
        Copy-Item $aria "uup\files\aria2c.exe" -Force

    # 🔥 AQUI ESTÁ O FIX REAL
    - name: Run UUP (CORRETO)
      shell: cmd
      working-directory: uup
      run: uup_download_windows.cmd

    # =========================
    # COPIAR PARA FILES
    # =========================
    - name: Copy updates
      shell: powershell
      run: |
        $dest = "work\out\Files\Updates"
        New-Item -ItemType Directory -Force -Path $dest | Out-Null

        Copy-Item "uup\*" $dest -Recurse -Force

    # =========================
    # W10UI
    # =========================
    - name: Run W10UI
      shell: cmd
      working-directory: work\out\Files
      run: W10UI.cmd

    # =========================
    # VALIDATE ISO
    # =========================
    - name: Validate ISO
      shell: powershell
      run: |
        $iso = Get-ChildItem work\out\Files -Recurse -Filter *.iso | Select-Object -First 1
        if (!$iso) { exit 1 }
        if ($iso.Length -lt 2GB) { exit 1 }

    # =========================
    # COMPRESS
    # =========================
    - name: Compress ISO
      shell: powershell
      run: |
        $iso = Get-ChildItem work\out\Files -Recurse -Filter *.iso | Select-Object -First 1
        7z a -tzip -v1900m Windows_11_FULL.zip $iso.FullName

    # =========================
    # RELEASE
    - name: Release
      uses: ncipollo/release-action@v1
      with:
        tag: windows-11-full-${{ github.run_number }}
        name: Windows 11 FULL ISO
        artifacts: Windows_11_FULL.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}
