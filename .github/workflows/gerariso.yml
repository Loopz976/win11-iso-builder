name: windows-11-iso-builder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install deps
      shell: powershell
      run: |
        choco install aria2 -y
        choco install 7zip -y

    # =========================
    # WORKDIR
    # =========================
    - name: Create work dir
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path work -Force

    # =========================
    # DOWNLOAD BASE (MESMA PASTA)
    # =========================
    - name: Download base parts
      shell: powershell
      run: |
        Set-Location work

        aria2c -x 16 -s 16 -k 1M -o base.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.001
        aria2c -x 16 -s 16 -k 1M -o base.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.002
        aria2c -x 16 -s 16 -k 1M -o base.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.003

        Write-Host "Parts downloaded"
        Get-ChildItem

    # =========================
    # EXTRAÇÃO CORRETA MULTIPART
    # =========================
    - name: Extract base (multipart)
      shell: powershell
      run: |
        Set-Location work

        # IMPORTANTE: só extrai pelo .001
        7z x base.7z.001 -oout -y

        if (!(Test-Path "out\Files")) {
          Write-Error "Files folder not found after extraction"
          exit 1
        }

        Write-Host "Extraction OK"
        Get-ChildItem out

    # =========================
    # APPLY INI
    # =========================
    - name: Apply W10UI.ini
      shell: powershell
      run: |
        Copy-Item "W10UI.ini" "work\out\Files\W10UI.ini" -Force

        Write-Host "INI applied"
        Get-Content "work\out\Files\W10UI.ini"

    # =========================
    # UUP
    # =========================
    - name: Extract UUP
      shell: powershell
      run: |
        Expand-Archive "uup11.zip" -DestinationPath "uup" -Force

    - name: Prepare aria2
      shell: powershell
      run: |
        $aria = (Get-Command aria2c).Source
        New-Item -ItemType Directory -Path "uup\files" -Force
        Copy-Item $aria "uup\files\aria2c.exe" -Force

    - name: Download updates
      shell: powershell
      run: |
        Set-Location uup
        cmd /c uup_download_windows.cmd

    # =========================
    # COPY UPDATES
    # =========================
    - name: Copy updates
      shell: powershell
      run: |
        $dest = "work\out\Files\Updates"

        New-Item -ItemType Directory -Force -Path $dest | Out-Null
        Copy-Item "uup\*" $dest -Recurse -Force

        $count = (Get-ChildItem $dest -Recurse).Count
        Write-Host "Updates: $count"

        if ($count -lt 50) {
          Write-Error "Updates incomplete"
          exit 1
        }

    # =========================
    # RUN W10UI
    # =========================
    - name: Run W10UI
      shell: powershell
      run: |
        Set-Location work\out\Files
        cmd /c W10UI.cmd

    # =========================
    # VALIDATE ISO
    # =========================
    - name: Validate ISO
      shell: powershell
      run: |
        $iso = Get-ChildItem work\out\Files -Recurse -Filter *.iso | Select-Object -First 1

        if (!$iso) {
          Write-Error "ISO not generated"
          exit 1
        }

        $size = $iso.Length
        Write-Host "ISO size: $size"

        if ($size -lt 2GB) {
          Write-Error "ISO too small"
          exit 1
        }

        Write-Host "ISO OK"

    # =========================
    # COMPRESS
    # =========================
    - name: Compress ISO
      shell: powershell
      run: |
        $iso = Get-ChildItem work\out\Files -Recurse -Filter *.iso | Select-Object -First 1
        7z a -tzip -v1900m Windows_11_FULL.zip $iso.FullName

    # =========================
    # RELEASE
    # =========================
    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        tag: windows-11-full-${{ github.run_number }}
        name: Windows 11 FULL ISO
        artifacts: Windows_11_FULL.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}
