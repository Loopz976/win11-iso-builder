name: Build W10 LTSC 21H2 FULL

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Instalar dependências
      shell: powershell
      run: |
        choco install aria2 -y
        choco install 7zip -y

    # =========================
    # WORKDIR
    # =========================
    - name: Criar pasta
      run: mkdir work

    # =========================
    # BASE
    # =========================
    - name: Baixar base
      shell: powershell
      run: |
        cd work
        aria2c -x 16 -s 16 -k 1M -o base.7z.001 "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.001"
        aria2c -x 16 -s 16 -k 1M -o base.7z.002 "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.002"
        aria2c -x 16 -s 16 -k 1M -o base.7z.003 "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.003"

    - name: Extrair base
      shell: powershell
      run: |
        cd work
        7z x base.7z.001 -oout

        if (!(Test-Path "work\out\Files")) {
          Write-Error "❌ Files não encontrada"
          exit 1
        }

    # =========================
    # FORÇAR INI
    # =========================
    - name: Configurar W10UI.ini
      shell: powershell
      run: |
        $ini = @"
AutoStart=1
AddUpdates=1
AddDrivers=1
Cleanup=1
ResetBase=1
Wim2ESD=1
Convert=1
Format=ESD
Compression=recovery
Drv_Source=Drivers\OS
"@

        Set-Content -Path "work\out\Files\W10UI.ini" -Value $ini -Encoding ASCII

    # =========================
    # UUP
    # =========================
    - name: Extrair UUP
      shell: powershell
      run: |
        Expand-Archive "uup11.zip" -DestinationPath "uup" -Force

    - name: Preparar aria2
      shell: powershell
      run: |
        $aria = (Get-Command aria2c).Source
        New-Item -ItemType Directory -Path "uup\files" -Force
        Copy-Item $aria "uup\files\aria2c.exe" -Force

    - name: Baixar updates
      shell: cmd
      working-directory: uup
      run: uup_download_windows.cmd

    # =========================
    # COPIAR TUDO
    # =========================
    - name: Copiar updates
      shell: powershell
      run: |
        $dest = "work\out\Files\Updates"
        New-Item -ItemType Directory -Force -Path $dest | Out-Null
        Copy-Item "uup\*" $dest -Recurse -Force

        $count = (Get-ChildItem $dest -Recurse).Count
        Write-Host "📦 Updates: $count arquivos"

    # =========================
    # DEBUG
    # =========================
    - name: Debug Files
      shell: powershell
      run: |
        Get-ChildItem work\out\Files

    # =========================
    # W10UI
    # =========================
    - name: Executar W10UI
      shell: cmd
      working-directory: work\out\Files
      run: W10UI.cmd

    # =========================
    # OSCDIMG
    # =========================
    - name: Baixar oscdimg
      shell: powershell
      run: |
        Invoke-WebRequest "https://raw.githubusercontent.com/erikcas/oscdimg/master/oscdimg.exe" -OutFile oscdimg.exe

    # =========================
    # GERAR ISO
    # =========================
    - name: Criar ISO final
      shell: powershell
      run: |
        .\oscdimg.exe -bwork\out\Files\ISO\boot\etfsboot.com -u2 -h -m -o `
        -bootdata:2#p0,e,bwork\out\Files\ISO\boot\etfsboot.com#pEF,e,bwork\out\Files\ISO\efi\microsoft\boot\efisys.bin `
        work\out\Files\ISO W10_LTSC_21H2_FULL.iso

    # =========================
    # VALIDAÇÃO FINAL (SÓ ISO)
    # =========================
    - name: Validar ISO
      shell: powershell
      run: |
        if (!(Test-Path "W10_LTSC_21H2_FULL.iso")) {
          Write-Error "❌ ISO não foi criada"
          exit 1
        }

        $size = (Get-Item "W10_LTSC_21H2_FULL.iso").Length
        Write-Host "📦 ISO criada - tamanho: $size bytes"

        if ($size -lt 2GB) {
          Write-Error "❌ ISO muito pequena"
          exit 1
        }

        Write-Host "=============================="
        Write-Host "✅ ISO GERADA COM SUCESSO"
        Write-Host "=============================="

    # =========================
    # SPLIT 1900MB
    # =========================
    - name: Compactar ISO (1900MB)
      shell: powershell
      run: |
        7z a -tzip -v1900m W10_LTSC_21H2_FULL.zip W10_LTSC_21H2_FULL.iso

    # =========================
    # RELEASE
    # =========================
    - name: Criar Release
      uses: ncipollo/release-action@v1
      with:
        tag: w10-ltsc21h2-full-${{ github.run_number }}
        name: W10 LTSC 21H2 FULL
        artifacts: W10_LTSC_21H2_FULL.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}
