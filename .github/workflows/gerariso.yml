name: windows-11-iso-builder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Instalar dependências
      run: |
        choco install aria2 -y
        choco install 7zip -y

    # =========================
    # WORKDIR
    # =========================
    - name: Criar pasta
      run: mkdir work

    # =========================
    # BAIXAR BASE (FILES PRONTA)
    # =========================
    - name: Baixar base
      run: |
        cd work
        aria2c -x 16 -s 16 -k 1M -o base.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.001
        aria2c -x 16 -s 16 -k 1M -o base.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.002
        aria2c -x 16 -s 16 -k 1M -o base.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.003

    - name: Extrair base
      run: |
        cd work
        7z x base.7z.001 -oout

    # =========================
    # SUBSTITUIR INI (NOME CORRETO)
    # =========================
    - name: Aplicar W10UI.ini
      shell: powershell
      run: |
        if (!(Test-Path "W10UI.ini")) {
          Write-Error "W10UI.ini não encontrado no repo"
          exit 1
        }

        Copy-Item "W10UI.ini" "work\out\Files\W10UI.ini" -Force

        Write-Host "INI aplicado:"
        Get-Content "work\out\Files\W10UI.ini"

    # =========================
    # UUP (DOWNLOAD COMPLETO)
    # =========================
    - name: Extrair UUP
      shell: powershell
      run: |
        Expand-Archive "uup11.zip" -DestinationPath "uup" -Force

        if (!(Test-Path "uup\uup_download_windows.cmd")) {
          Write-Error "Script UUP não encontrado"
          exit 1
        }

    - name: Preparar aria2
      shell: powershell
      run: |
        $aria = (Get-Command aria2c).Source
        New-Item -ItemType Directory -Path "uup\files" -Force
        Copy-Item $aria "uup\files\aria2c.exe" -Force

    - name: Baixar updates completos
      run: |
        cd uup
        uup_download_windows.cmd

    # =========================
    # COPIAR 100% DOS UPDATES
    # =========================
    - name: Copiar updates
      shell: powershell
      run: |
        $dest = "work\out\Files\Updates"
        New-Item -ItemType Directory -Force -Path $dest | Out-Null
        Copy-Item "uup\*" $dest -Recurse -Force

        $count = (Get-ChildItem $dest -Recurse).Count
        Write-Host "Arquivos copiados: $count"

        if ($count -lt 50) {
          Write-Error "Updates incompletos"
          exit 1
        }

    # =========================
    # DEBUG
    # =========================
    - name: Debug estrutura
      shell: powershell
      run: |
        Get-ChildItem work\out\Files
        Get-ChildItem work\out\Files\ISO

    # =========================
    # EXECUTAR W10UI
    # =========================
    - name: Rodar W10UI
      run: |
        cd work\out\Files
        W10UI.cmd

    # =========================
    # BAIXAR OSCDIMG
    # =========================
    - name: Baixar oscdimg
      shell: powershell
      run: |
        Invoke-WebRequest https://raw.githubusercontent.com/erikcas/oscdimg/master/oscdimg.exe -OutFile oscdimg.exe

    # =========================
    # GERAR ISO FINAL
    # =========================
    - name: Criar ISO
      shell: powershell
      run: |
        .\oscdimg.exe -bwork\out\Files\ISO\boot\etfsboot.com -u2 -h -m -o `
        -bootdata:2#p0,e,bwork\out\Files\ISO\boot\etfsboot.com#pEF,e,bwork\out\Files\ISO\efi\microsoft\boot\efisys.bin `
        work\out\Files\ISO Windows_11_FULL.iso

    # =========================
    # VALIDAR ISO (SIMPLES)
    # =========================
    - name: Validar ISO
      shell: powershell
      run: |
        if (!(Test-Path "Windows_11_FULL.iso")) {
          Write-Error "ISO não foi criada"
          exit 1
        }

        $size = (Get-Item "Windows_11_FULL.iso").Length
        Write-Host "Tamanho ISO: $size bytes"

        if ($size -lt 2GB) {
          Write-Error "ISO inválida"
          exit 1
        }

        Write-Host "ISO OK"

    # =========================
    # SPLIT 1900MB
    # =========================
    - name: Compactar ISO
      run: |
        7z a -tzip -v1900m Windows_11_FULL.zip Windows_11_FULL.iso

    # =========================
    # RELEASE
    # =========================
    - name: Criar Release
      uses: ncipollo/release-action@v1
      with:
        tag: windows-11-full-${{ github.run_number }}
        name: Windows 11 FULL ISO
        artifacts: Windows_11_FULL.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}
