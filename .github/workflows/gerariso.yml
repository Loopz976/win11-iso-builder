name: windows-11-custom-builder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # =========================
    # DEPENDENCIAS
    # =========================
    - name: Install deps
      shell: powershell
      run: |
        choco install aria2 -y
        choco install 7zip -y

    # =========================
    # WORKSPACE
    # =========================
    - name: Create workspace
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path work -Force

    # =========================
    # DOWNLOAD BASE (MULTIPART)
    # =========================
    - name: Download base
      shell: powershell
      run: |
        cd work

        aria2c -x 16 -s 16 -k 1M -o base.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.001
        aria2c -x 16 -s 16 -k 1M -o base.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.002
        aria2c -x 16 -s 16 -k 1M -o base.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.003

        Get-ChildItem

    # =========================
    # EXTRAIR BASE
    # =========================
    - name: Extract base
      shell: powershell
      run: |
        cd work

        7z x base.7z.001 -oout -y

        if (!(Test-Path "out\Files")) {
          Write-Error "ERRO: Files nao encontrado"
          exit 1
        }

        Write-Host "Base extraida com sucesso"

    # =========================
    # VALIDAR ESTRUTURA BASE
    # =========================
    - name: Validate base structure
      shell: powershell
      run: |
        $base = "work\out\Files"

        if (!(Test-Path "$base\W10UI.cmd")) { exit 1 }
        if (!(Test-Path "$base\W10UI.ini")) { exit 1 }
        if (!(Test-Path "$base\ISO")) { exit 1 }

        Write-Host "Estrutura OK"

    # =========================
    # EXTRAIR UUP (ZIP DO REPO)
    # =========================
    - name: Extract UUP
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path uup -Force

        $zip = Get-ChildItem -Filter *.zip | Select-Object -First 1

        if (!$zip) {
          Write-Error "ZIP UUP nao encontrado"
          exit 1
        }

        7z x $zip.FullName -ouup -y

        if (!(Test-Path "uup\uup_download_windows.cmd")) {
          Write-Error "Script UUP nao encontrado"
          exit 1
        }

        Write-Host "UUP pronto"

    # =========================
    # PREPARAR ARIA2
    # =========================
    - name: Prepare aria2
      shell: powershell
      run: |
        $aria = (Get-Command aria2c).Source
        Copy-Item $aria "uup\aria2c.exe" -Force

    # =========================
    # BAIXAR UPDATES (REAL)
    # =========================
    - name: Run UUP download
      shell: cmd
      working-directory: uup
      run: uup_download_windows.cmd

    # =========================
    # COPIAR UPDATES PARA BASE
    # =========================
    - name: Copy updates
      shell: powershell
      run: |
        $dest = "work\out\Files\Updates"

        New-Item -ItemType Directory -Force -Path $dest | Out-Null

        Copy-Item "uup\*" $dest -Recurse -Force

        $count = (Get-ChildItem $dest -Recurse).Count
        Write-Host "Arquivos copiados: $count"

        if ($count -lt 50) {
          Write-Error "ERRO: Updates incompletos"
          exit 1
        }

    # =========================
    # EXECUTAR W10UI (AUTOMATICO)
    # =========================
    - name: Run W10UI
      shell: cmd
      working-directory: work\out\Files
      run: W10UI.cmd

    # =========================
    # VALIDAR ISO FINAL
    # =========================
    - name: Validate ISO
      shell: powershell
      run: |
        $iso = Get-ChildItem work\out\Files -Recurse -Filter *.iso | Select-Object -First 1

        if (!$iso) {
          Write-Error "ISO nao gerada"
          exit 1
        }

        if ($iso.Length -lt 2GB) {
          Write-Error "ISO invalida"
          exit 1
        }

        Write-Host "ISO OK: $($iso.FullName)"

    # =========================
    # COMPACTAR EM PARTES
    # =========================
    - name: Compress ISO
      shell: powershell
      run: |
        $iso = Get-ChildItem work\out\Files -Recurse -Filter *.iso | Select-Object -First 1

        7z a -tzip -v1900m Windows_11_CUSTOM.zip $iso.FullName

    # =========================
    # RELEASE FINAL
    # =========================
    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        tag: windows-11-custom-${{ github.run_number }}
        name: Windows 11 CUSTOM ISO
        artifacts: Windows_11_CUSTOM.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}
