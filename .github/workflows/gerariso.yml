name: windows-11-iso-builder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Instalar dependências
      shell: powershell
      run: |
        choco install aria2 -y
        choco install 7zip -y

    # =========================
    # WORKDIR
    # =========================
    - name: Criar pasta
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path work -Force

    # =========================
    # BAIXAR BASE
    # =========================
    - name: Baixar base
      shell: powershell
      run: |
        Set-Location work

        aria2c -x 16 -s 16 -k 1M -o base.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.001
        aria2c -x 16 -s 16 -k 1M -o base.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.002
        aria2c -x 16 -s 16 -k 1M -o base.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.003

    # =========================
    # EXTRAIR BASE (7ZIP)
    # =========================
    - name: Extrair base
      shell: powershell
      run: |
        Set-Location work

        7z x base.7z.001 -oout -y

        if (!(Test-Path "work\out\Files")) {
          Write-Error "❌ Pasta Files não encontrada"
          exit 1
        }

        Write-Host "✔ Base extraída com sucesso"

    # =========================
    # APLICAR INI
    # =========================
    - name: Aplicar W10UI.ini
      shell: powershell
      run: |
        Copy-Item "W10UI.ini" "work\out\Files\W10UI.ini" -Force

        Write-Host "INI aplicado:"
        Get-Content "work\out\Files\W10UI.ini"

    # =========================
    # UUP
    # =========================
    - name: Extrair UUP
      shell: powershell
      run: |
        Expand-Archive "uup11.zip" -DestinationPath "uup" -Force

    - name: Preparar aria2
      shell: powershell
      run: |
        $aria = (Get-Command aria2c).Source
        New-Item -ItemType Directory -Path "uup\files" -Force
        Copy-Item $aria "uup\files\aria2c.exe" -Force

    - name: Baixar updates
      shell: powershell
      run: |
        Set-Location uup
        cmd /c uup_download_windows.cmd

    # =========================
    # COPIAR UPDATES
    # =========================
    - name: Copiar updates
      shell: powershell
      run: |
        $dest = "work\out\Files\Updates"

        New-Item -ItemType Directory -Force -Path $dest | Out-Null

        Copy-Item "uup\*" $dest -Recurse -Force

        $count = (Get-ChildItem $dest -Recurse).Count
        Write-Host "📦 Updates copiados: $count"

        if ($count -lt 50) {
          Write-Error "❌ Updates incompletos"
          exit 1
        }

    # =========================
    # DEBUG
    # =========================
    - name: Debug estrutura
      shell: powershell
      run: |
        Get-ChildItem work\out\Files
        Get-ChildItem work\out\Files\ISO

    # =========================
    # W10UI
    # =========================
    - name: Rodar W10UI
      shell: powershell
      run: |
        Set-Location work\out\Files
        cmd /c W10UI.cmd

    # =========================
    # VALIDAR ISO
    # =========================
    - name: Validar ISO
      shell: powershell
      run: |
        $iso = Get-ChildItem work\out\Files -Recurse -Filter *.iso | Select-Object -First 1

        if (!$iso) {
          Write-Error "❌ ISO não foi gerada"
          exit 1
        }

        $size = $iso.Length
        Write-Host "ISO: $($iso.FullName)"
        Write-Host "Tamanho: $size bytes"

        if ($size -lt 2GB) {
          Write-Error "❌ ISO inválida"
          exit 1
        }

        Write-Host "✔ ISO OK"

    # =========================
    # COMPACTAR (7ZIP)
    # =========================
    - name: Compactar ISO
      shell: powershell
      run: |
        $iso = Get-ChildItem work\out\Files -Recurse -Filter *.iso | Select-Object -First 1
        7z a -tzip -v1900m Windows_11_FULL.zip $iso.FullName

    # =========================
    # RELEASE
    # =========================
    - name: Criar Release
      uses: ncipollo/release-action@v1
      with:
        tag: windows-11-full-${{ github.run_number }}
        name: Windows 11 FULL ISO
        artifacts: Windows_11_FULL.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}
