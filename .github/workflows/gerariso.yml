name: windows-11-iso-builder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install deps
      shell: powershell
      run: |
        choco install aria2 -y
        choco install 7zip -y

    - name: Prepare workspace
      shell: powershell
      run: |
        $work = "$env:GITHUB_WORKSPACE\work"
        New-Item -ItemType Directory -Path $work -Force
        echo "WORK=$work" >> $env:GITHUB_ENV

    # =========================
    # DOWNLOAD BASE
    # =========================
    - name: Download base
      shell: powershell
      run: |
        Set-Location $env:WORK

        aria2c -o base.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.001
        aria2c -o base.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.002
        aria2c -o base.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.003

    # =========================
    # EXTRACT BASE
    # =========================
    - name: Extract base
      shell: powershell
      run: |
        Set-Location $env:WORK

        7z x base.7z.001 -o"$env:WORK\out" -y

        if (!(Test-Path "$env:WORK\out\Files")) {
          Write-Error "Files not found"
          exit 1
        }

    # =========================
    # CRIAR INI DIRETO (FIX TOTAL)
    # =========================
    - name: Create W10UI.ini
      shell: powershell
      run: |
        $ini = "$env:WORK\out\Files\W10UI.ini"

        Remove-Item $ini -ErrorAction SilentlyContinue

        Add-Content $ini "AutoStart=1"
        Add-Content $ini "AddUpdates=1"
        Add-Content $ini "AddDrivers=1"
        Add-Content $ini "Cleanup=1"
        Add-Content $ini "ResetBase=1"
        Add-Content $ini "Wim2ESD=1"
        Add-Content $ini "Convert=1"
        Add-Content $ini "Format=ESD"
        Add-Content $ini "Compression=recovery"
        Add-Content $ini "Drv_Source=Drivers\OS"

        Write-Host "INI created"

    # =========================
    # UUP
    # =========================
    - name: Extract UUP
      shell: powershell
      run: |
        Expand-Archive "$env:GITHUB_WORKSPACE\uup11.zip" -DestinationPath "$env:GITHUB_WORKSPACE\uup" -Force

    - name: Prepare aria2
      shell: powershell
      run: |
        $aria = (Get-Command aria2c).Source
        New-Item -ItemType Directory -Path "$env:GITHUB_WORKSPACE\uup\files" -Force
        Copy-Item $aria "$env:GITHUB_WORKSPACE\uup\files\aria2c.exe" -Force

    - name: Download updates
      shell: powershell
      run: |
        Set-Location "$env:GITHUB_WORKSPACE\uup"
        cmd /c uup_download_windows.cmd

    # =========================
    # COPY UPDATES
    # =========================
    - name: Copy updates
      shell: powershell
      run: |
        $dest = "$env:WORK\out\Files\Updates"
        New-Item -ItemType Directory -Force -Path $dest | Out-Null
        Copy-Item "$env:GITHUB_WORKSPACE\uup\*" $dest -Recurse -Force

    # =========================
    # RUN W10UI
    # =========================
    - name: Run W10UI
      shell: powershell
      run: |
        Set-Location "$env:WORK\out\Files"
        cmd /c W10UI.cmd

    # =========================
    # VALIDATE ISO
    # =========================
    - name: Validate ISO
      shell: powershell
      run: |
        $iso = Get-ChildItem "$env:WORK\out\Files" -Recurse -Filter *.iso | Select-Object -First 1

        if (!$iso) { exit 1 }
        if ($iso.Length -lt 2GB) { exit 1 }

    # =========================
    # COMPRESS
    # =========================
    - name: Compress ISO
      shell: powershell
      run: |
        $iso = Get-ChildItem "$env:WORK\out\Files" -Recurse -Filter *.iso | Select-Object -First 1
        7z a -tzip -v1900m Windows_11_FULL.zip $iso.FullName

    # =========================
    # RELEASE
    # =========================
    - name: Release
      uses: ncipollo/release-action@v1
      with:
        tag: windows-11-full-${{ github.run_number }}
        name: Windows 11 FULL ISO
        artifacts: Windows_11_FULL.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}
