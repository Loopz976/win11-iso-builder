name: BUILD ISO (W10UI FULL NATIVE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Criar pasta base
      - name: Criar estrutura
        run: |
          mkdir work
          mkdir work\files

      # 3. Baixar ISO BASE (partes)
      - name: Download ISO Base (parts)
        run: |
          cd work
          curl -L -o iso.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10.7z.001
          curl -L -o iso.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10.7z.002
          curl -L -o iso.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10.7z.003

      # 4. Extrair ISO base
      - name: Extrair ISO
        run: |
          cd work
          7z x iso.7z.001 -oiso

      # 5. Mover ISO para pasta FILES (intocável)
      - name: Mover ISO para files
        run: |
          move work\iso\*.iso work\files\

      # 6. Baixar W10UI
      - name: Baixar W10UI
        run: |
          cd work
          curl -L -o W10UI.zip https://tiny.cc/W10UI

      # 7. Extrair W10UI dentro da pasta FILES
      - name: Extrair W10UI
        run: |
          7z x work\W10UI.zip -owork\files\

      # 8. Baixar updates
      - name: Baixar Updates
        run: |
          mkdir work\files\updates
          cd work\files\updates

          # EXEMPLO (ajuste depois com seus updates reais)
          curl -L -o update1.cab https://example.com/update1.cab
          curl -L -o update2.msu https://example.com/update2.msu

      # 9. Criar W10UI.ini já configurado
      - name: Criar config W10UI.ini
        run: |
          echo [W10UI] > work\files\W10UI.ini
          echo AutoStart=1 >> work\files\W10UI.ini
          echo AddUpdates=1 >> work\files\W10UI.ini
          echo Cleanup=1 >> work\files\W10UI.ini
          echo ResetBase=1 >> work\files\W10UI.ini
          echo NetFx3=1 >> work\files\W10UI.ini
          echo StartVirtual=0 >> work\files\W10UI.ini
          echo wim2esd=1 >> work\files\W10UI.ini
          echo SkipISO=0 >> work\files\W10UI.ini

      # 10. Executar W10UI (dentro da pasta files)
      - name: Rodar W10UI
        run: |
          cd work\files
          dir
          call W10UI.cmd

      # 11. Compactar ISO final em partes 1900MB
      - name: Compactar ISO Final
        run: |
          mkdir output
          move work\files\*.iso output\

          cd output
          7z a -v1900m final_iso.7z *.iso

      # 12. Upload artifact
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: ISO_FINAL
          path: output\*.7z
