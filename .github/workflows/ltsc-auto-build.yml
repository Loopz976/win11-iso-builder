name: LTSC AUTO BUILD (UUP REAL + ESD + SPLIT)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:

    # 🔹 CACHE ISO BASE
    - name: Cache ISO
      id: cache-iso
      uses: actions/cache@v4
      with:
        path: source.iso
        key: ltsc-iso-v1

    # 🔹 DOWNLOAD ISO
    - name: Baixar ISO
      if: steps.cache-iso.outputs.cache-hit != 'true'
      run: |
        curl -L -o part.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.001
        curl -L -o part.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.002
        curl -L -o part.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.003

    - name: Instalar 7zip
      run: choco install 7zip -y

    - name: Extrair ISO
      if: steps.cache-iso.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        & "C:\Program Files\7-Zip\7z.exe" x part.7z.001 -aoa

    - name: Padronizar ISO
      if: steps.cache-iso.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        $iso = Get-ChildItem *.iso | Select-Object -First 1
        Rename-Item $iso.Name source.iso

    # 🔹 EXTRAIR ISO
    - name: Criar work
      run: mkdir work

    - name: Extrair ISO
      shell: powershell
      run: |
        & "C:\Program Files\7-Zip\7z.exe" x source.iso -owork -aoa

    # 🔹 BACKUP
    - name: Backup WIM
      run: copy work\sources\install.wim work\sources\install_original.wim

    # ================================
    # 🔥 DOWNLOAD DOS UPDATES (SEU PRINT)
    # ================================
    - name: Criar pasta updates
      run: mkdir updates

    - name: Baixar CABs
      shell: powershell
      run: |
        cd updates

        curl -L -O https://catalog.s.download.windowsupdate.com/.../SSU-19041.7183-x64.cab
        curl -L -O https://catalog.s.download.windowsupdate.com/.../Windows10.0-KB5003791-x64.cab
        curl -L -O https://catalog.s.download.windowsupdate.com/.../Windows10.0-KB5007401-x64.cab
        curl -L -O https://catalog.s.download.windowsupdate.com/.../Windows10.0-KB5008575-x64.cab
        curl -L -O https://catalog.s.download.windowsupdate.com/.../Windows10.0-KB5007427-x64.cab
        curl -L -O https://catalog.s.download.windowsupdate.com/.../Windows10.0-KB5082200-x64.cab
        curl -L -O https://catalog.s.download.windowsupdate.com/.../Windows10.0-KB5082241-x64.cab

    # ================================
    # 🔥 MOUNT
    # ================================
    - name: Criar mount
      run: mkdir mount

    - name: Montar WIM
      shell: powershell
      run: |
        dism /Mount-Wim /WimFile:work\sources\install.wim /index:1 /MountDir:mount

    # ================================
    # 🔥 INTEGRAÇÃO CORRETA
    # ================================
    - name: Integrar SSU
      shell: powershell
      run: |
        dism /Image:mount /Add-Package /PackagePath:updates\SSU-19041.7183-x64.cab

    - name: Integrar LCU
      shell: powershell
      run: |
        dism /Image:mount /Add-Package /PackagePath:updates

    # ================================
    # 🔥 CLEANUP HARD
    # ================================
    - name: Cleanup
      shell: powershell
      run: |
        dism /Image:mount /Cleanup-Image /StartComponentCleanup /ResetBase

    # ================================
    # 🔥 UNMOUNT
    # ================================
    - name: Commit
      shell: powershell
      run: |
        dism /Unmount-Wim /MountDir:mount /Commit

    # ================================
    # 🔥 ESD (MAX COMPRESSION)
    # ================================
    - name: Converter para ESD
      shell: powershell
      run: |
        dism /Export-Image /SourceImageFile:work\sources\install.wim `
        /SourceIndex:1 `
        /DestinationImageFile:work\sources\install.esd `
        /Compress:recovery

        del work\sources\install.wim

    # ================================
    # 🔥 CRIAR ISO
    # ================================
    - name: Instalar ADK
      run: choco install windows-adk -y

    - name: Criar ISO
      shell: powershell
      run: |
        $oscdimg = "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools\amd64\Oscdimg\oscdimg.exe"

        & $oscdimg -bwork\boot\etfsboot.com -u2 -h -m -o -lLTSC_UUP work final.iso

    # ================================
    # 🔥 SPLIT 1900MB
    # ================================
    - name: Split ISO
      shell: powershell
      run: |
        & "C:\Program Files\7-Zip\7z.exe" a split.7z final.iso -v1900m

    - name: Remover ISO
      run: del final.iso

    # ================================
    # 📦 UPLOAD
    # ================================
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: LTSC-FINAL
        path: split.7z.*
