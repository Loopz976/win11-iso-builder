name: BUILD ISO LTSC FINAL (TARGET CORRETO)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Estrutura
      - name: Criar estrutura
        run: |
          mkdir work
          mkdir work\files
          mkdir work\files\base

      # 3. Download ISO (3 partes)
      - name: Baixar ISO
        run: |
          cd work
          curl -L -o W10LTSC2021.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.001
          curl -L -o W10LTSC2021.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.002
          curl -L -o W10LTSC2021.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.003

      # 4. Extrair ISO (merge automático)
      - name: Extrair ISO
        run: |
          cd work
          7z x W10LTSC2021.7z.001 -oiso

      # 5. Copiar ISO original (sem renomear)
      - name: Copiar ISO
        run: |
          move work\iso\*.iso work\files\

      # 6. Extrair ISO → files\base (TARGET REAL)
      - name: Extrair ISO para base
        run: |
          for %%f in (work\files\*.iso) do 7z x "%%f" -owork\files\base

      # 7. Limpar partes ISO
      - name: Limpar partes
        run: |
          Remove-Item work\W10LTSC2021.7z.* -Force -ErrorAction SilentlyContinue

      # 8. Remover ISO original
      - name: Remover ISO
        run: |
          Remove-Item work\files\*.iso -Force

      # 9. Baixar W10UI
      - name: Baixar W10UI
        run: |
          cd work
          curl -L -o W10UI.zip https://tiny.cc/W10UI

      # 10. Extrair W10UI na raiz files
      - name: Extrair W10UI
        run: |
          7z x work\W10UI.zip -owork\files\

      # 11. Limpar zip
      - name: Limpar zip
        run: |
          Remove-Item work\W10UI.zip -Force

      # 12. Baixar driver NVIDIA
      - name: Baixar driver NVIDIA
        run: |
          cd work
          curl -L -o nvidia.exe https://us.download.nvidia.com/Windows/341.92/341.92-desktop-win10-64bit-international.exe

      # 13. Extrair driver com 7zip
      - name: Extrair driver
        run: |
          7z x work\nvidia.exe -owork\nvidia

      # 14. Copiar Display.Driver → Drivers\OS
      - name: Preparar driver
        run: |
          mkdir work\files\Drivers\OS
          xcopy /E /I /Y work\nvidia\Display.Driver work\files\Drivers\OS\Display.Driver

      # 15. Limpar driver temp
      - name: Limpar driver
        run: |
          Remove-Item work\nvidia -Recurse -Force
          Remove-Item work\nvidia.exe -Force

      # 16. Updates (coloque os reais depois)
      - name: Preparar updates
        run: |
          mkdir work\files\updates
          echo coloque_updates_aqui > work\files\updates\readme.txt

      # 17. Criar W10UI.ini (TARGET DEFINITIVO)
      - name: Configurar W10UI
        run: |
          echo [W10UI] > work\files\W10UI.ini
          echo AutoStart=1 >> work\files\W10UI.ini
          echo AddUpdates=1 >> work\files\W10UI.ini
          echo AddDrivers=1 >> work\files\W10UI.ini
          echo Cleanup=1 >> work\files\W10UI.ini
          echo ResetBase=1 >> work\files\W10UI.ini
          echo NetFx3=1 >> work\files\W10UI.ini
          echo StartVirtual=0 >> work\files\W10UI.ini
          echo wim2esd=1 >> work\files\W10UI.ini
          echo SkipISO=0 >> work\files\W10UI.ini
          echo Target=.\base >> work\files\W10UI.ini

      # 18. Executar W10UI
      - name: Executar W10UI
        run: |
          cd work\files
          echo === EXECUTANDO W10UI ===
          call W10UI.cmd

      # 19. Organizar ISO final
      - name: Organizar saída
        run: |
          mkdir output
          move work\files\*.iso output\

      # 20. Compactar ISO (1900MB)
      - name: Compactar ISO
        run: |
          cd output
          7z a -v1900m FINAL_LTSC.7z *.iso

      # 21. Upload
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ISO_FINAL
          path: output\*.7z
