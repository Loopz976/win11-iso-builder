name: LTSC AUTO BUILD (Base + Prepare)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:

    # 🔹 CACHE DA ISO
    - name: Cache ISO
      id: cache-iso
      uses: actions/cache@v4
      with:
        path: source.iso
        key: ltsc-iso-v1

    # 🔹 BAIXAR PARTES (SE NÃO TEM CACHE)
    - name: Baixar partes da ISO
      if: steps.cache-iso.outputs.cache-hit != 'true'
      run: |
        curl -L -o part.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.001
        curl -L -o part.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.002
        curl -L -o part.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.003

    # 🔹 INSTALAR 7ZIP
    - name: Instalar 7zip
      if: steps.cache-iso.outputs.cache-hit != 'true'
      run: choco install 7zip -y

    # 🔹 EXTRAIR ISO
    - name: Extrair ISO
      if: steps.cache-iso.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        & "C:\Program Files\7-Zip\7z.exe" x part.7z.001 -aoa

    # 🔹 PADRONIZAR NOME
    - name: Padronizar ISO
      if: steps.cache-iso.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        $iso = Get-ChildItem *.iso | Select-Object -First 1
        Rename-Item $iso.Name source.iso

    # 🔹 LIMPAR PARTES
    - name: Limpar partes
      if: steps.cache-iso.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        Remove-Item *.7z* -Force -ErrorAction SilentlyContinue

    # 🔹 VALIDAR ISO
    - name: Validar ISO
      shell: powershell
      run: |
        if (Test-Path "source.iso") {
          Write-Host "ISO pronta"
        } else {
          Write-Error "ISO não encontrada"
          exit 1
        }

    # 🔹 EXTRAIR ISO PARA PASTA (FORMA CORRETA)
    - name: Criar pasta base
      run: mkdir work

    - name: Extrair ISO para pasta
      shell: powershell
      run: |
        & "C:\Program Files\7-Zip\7z.exe" x source.iso -owork -aoa

    # 🔹 REMOVER ISO (ECONOMIA DE ESPAÇO)
    - name: Remover ISO original
      shell: powershell
      run: |
        Remove-Item source.iso -Force

    # 🔹 VALIDAR ESTRUTURA
    - name: Validar estrutura
      shell: powershell
      run: |
        if (Test-Path "work\sources\install.wim") {
          Write-Host "Base pronta para integração"
        } else {
          Write-Error "install.wim não encontrado"
          exit 1
        }
