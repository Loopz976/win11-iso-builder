name: BUILD ISO LTSC FINAL (FINAL DEFINITIVE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # BASE
      - name: Criar estrutura
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path C:\Files | Out-Null
          New-Item -ItemType Directory -Force -Path work | Out-Null

      # ISO DOWNLOAD
      - name: Baixar ISO
        shell: powershell
        run: |
          Set-Location work
          curl.exe -L -o W10LTSC2021.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.001
          curl.exe -L -o W10LTSC2021.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.002
          curl.exe -L -o W10LTSC2021.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.003

      - name: Extrair ISO
        shell: powershell
        run: |
          Set-Location work
          7z x W10LTSC2021.7z.001 -oiso

      - name: Mover ISO
        shell: powershell
        run: |
          $iso = Get-ChildItem work\iso\*.iso | Select-Object -First 1
          if (-not $iso) { throw "ISO não encontrada" }
          Move-Item $iso.FullName C:\Files\ -Force

      - name: Limpar partes
        shell: powershell
        run: |
          Remove-Item work\W10LTSC2021.7z.* -Force -ErrorAction SilentlyContinue

      # W10UI
      - name: Baixar W10UI
        shell: powershell
        run: |
          Set-Location work
          curl.exe -L -o W10UI.zip https://tiny.cc/W10UI

      - name: Extrair W10UI
        shell: powershell
        run: |
          7z x work\W10UI.zip -oC:\Files

      - name: Limpar zip
        shell: powershell
        run: |
          Remove-Item work\W10UI.zip -Force

      # DRIVER
      - name: Baixar driver NVIDIA
        shell: powershell
        run: |
          Set-Location work
          curl.exe -L -o nvidia.exe https://us.download.nvidia.com/Windows/341.92/341.92-desktop-win10-64bit-international.exe

      - name: Extrair driver
        shell: powershell
        run: |
          7z x work\nvidia.exe -owork\nvidia

      - name: Preparar driver
        shell: powershell
        run: |
          $dest = "C:\Files\Drivers\OS"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item "work\nvidia\Display.Driver" -Destination $dest -Recurse -Force

      - name: Limpar driver
        shell: powershell
        run: |
          Remove-Item work\nvidia -Recurse -Force
          Remove-Item work\nvidia.exe -Force

      # 🔥 MONTAR ISO (CHAVE)
      - name: Montar ISO
        shell: powershell
        run: |
          $iso = (Get-ChildItem C:\Files\*.iso | Select-Object -First 1).FullName
          $mount = Mount-DiskImage -ImagePath $iso -PassThru
          $drive = ($mount | Get-Volume).DriveLetter
          echo "DRIVE=$drive" >> $env:GITHUB_ENV

      # DEBUG
      - name: Verificar estrutura
        shell: powershell
        run: |
          Write-Host "FILES:"
          Get-ChildItem C:\Files
          Write-Host "DRIVE:"
          echo $env:DRIVE

      # 🚀 EXECUÇÃO FINAL (100% AUTOMÁTICA)
      - name: Executar W10UI automático
        shell: powershell
        run: |
          Set-Location C:\Files
          $d = $env:DRIVE

          $input = @"
1
$d:\
0
"@

          $input | cmd /c W10UI.cmd

      # OUTPUT
      - name: Organizar ISO
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path output | Out-Null
          Move-Item C:\Files\*.iso output\ -Force

      - name: Compactar ISO
        shell: powershell
        run: |
          Set-Location output
          7z a -v1900m FINAL_LTSC.7z *.iso

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ISO_FINAL
          path: output\*.7z
