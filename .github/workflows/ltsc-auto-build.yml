    # ================================
    # 🔥 INTEGRAÇÃO CORRETA (ORDEM)
    # ================================

    - name: Integrar SSU
      shell: powershell
      run: |
        $ssu = Get-ChildItem updates | Where-Object {$_.Name -like "*SSU*"}
        dism /Image:mount /Add-Package /PackagePath:$ssu.FullName

    - name: Integrar Enablement
      shell: powershell
      run: |
        $en = Get-ChildItem updates | Where-Object {$_.Name -like "*KB5003791*"}
        dism /Image:mount /Add-Package /PackagePath:$en.FullName

    - name: Integrar restantes
      shell: powershell
      run: |
        $rest = Get-ChildItem updates | Where-Object {
          $_.Name -notlike "*SSU*" -and $_.Name -notlike "*KB5003791*"
        }

        foreach ($pkg in $rest) {
          Write-Host "Integrando $($pkg.Name)"
          dism /Image:mount /Add-Package /PackagePath:$pkg.FullName
        }
