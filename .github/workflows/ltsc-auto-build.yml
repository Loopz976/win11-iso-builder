name: LTSC AUTO BUILD (FIX DOWNLOAD + UUP + ESD + SPLIT)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:

    # 🔹 CACHE ISO
    - name: Cache ISO
      id: cache-iso
      uses: actions/cache@v4
      with:
        path: source.iso
        key: ltsc-iso-v1

    # ================================
    # 🔥 DOWNLOAD FIX (SEM TRAVAR)
    # ================================
    - name: Baixar ISO partes (FIX)
      if: steps.cache-iso.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        curl.exe -L "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.001" -o part.7z.001
        curl.exe -L "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.002" -o part.7z.002
        curl.exe -L "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.003" -o part.7z.003

    # 🔹 7ZIP
    - name: Instalar 7zip
      run: choco install 7zip -y

    - name: Extrair ISO
      if: steps.cache-iso.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        & "C:\Program Files\7-Zip\7z.exe" x part.7z.001 -aoa

    - name: Padronizar ISO
      if: steps.cache-iso.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        $iso = Get-ChildItem *.iso | Select-Object -First 1
        Rename-Item $iso.Name source.iso

    # 🔹 EXTRAIR ISO
    - name: Criar work
      run: mkdir work

    - name: Extrair ISO
      shell: powershell
      run: |
        & "C:\Program Files\7-Zip\7z.exe" x source.iso -owork -aoa

    # 🔹 BACKUP
    - name: Backup WIM
      run: copy work\sources\install.wim work\sources\install_original.wim

    # ================================
    # 🔥 UUP AUTOMÁTICO
    # ================================
    - name: Clonar UUP
      run: git clone https://github.com/uup-dump/uup-dump.git uup

    - name: Baixar updates
      shell: powershell
      run: |
        cd uup
        cmd /c uup_download_windows.cmd

    # ================================
    # 🔥 MOUNT
    # ================================
    - name: Criar mount
      run: mkdir mount

    - name: Montar WIM
      shell: powershell
      run: |
        dism /Mount-Wim /WimFile:work\sources\install.wim /index:1 /MountDir:mount

    # 🔥 INTEGRAR
    - name: Integrar updates
      shell: powershell
      run: |
        dism /Image:mount /Add-Package /PackagePath:uup

    # 🔥 CLEAN
    - name: Cleanup
      shell: powershell
      run: |
        dism /Image:mount /Cleanup-Image /StartComponentCleanup /ResetBase

    # 🔥 UNMOUNT
    - name: Commit
      shell: powershell
      run: |
        dism /Unmount-Wim /MountDir:mount /Commit

    # 🔥 ESD
    - name: Converter ESD
      shell: powershell
      run: |
        dism /Export-Image /SourceImageFile:work\sources\install.wim `
        /SourceIndex:1 `
        /DestinationImageFile:work\sources\install.esd `
        /Compress:recovery

        del work\sources\install.wim

    # 🔥 ISO
    - name: Instalar ADK
      run: choco install windows-adk -y

    - name: Criar ISO
      shell: powershell
      run: |
        $oscdimg = "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools\amd64\Oscdimg\oscdimg.exe"

        & $oscdimg -bwork\boot\etfsboot.com -u2 -h -m -o -lLTSC_FINAL work final.iso

    # 🔥 SPLIT
    - name: Split ISO
      shell: powershell
      run: |
        & "C:\Program Files\7-Zip\7z.exe" a split.7z final.iso -v1900m

    - name: Remover ISO
      run: del final.iso

    # 📦 UPLOAD
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: LTSC-FINAL
        path: split.7z.*
