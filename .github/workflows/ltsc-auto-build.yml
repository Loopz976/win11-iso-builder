name: LTSC AUTO BUILD (FULL + SPLIT)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:

    # 🔹 CACHE ISO
    - name: Cache ISO
      id: cache-iso
      uses: actions/cache@v4
      with:
        path: source.iso
        key: ltsc-iso-v1

    # 🔹 DOWNLOAD ISO
    - name: Baixar partes
      if: steps.cache-iso.outputs.cache-hit != 'true'
      run: |
        curl -L -o part.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.001
        curl -L -o part.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.002
        curl -L -o part.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.003

    - name: Instalar 7zip
      if: steps.cache-iso.outputs.cache-hit != 'true'
      run: choco install 7zip -y

    - name: Extrair ISO
      if: steps.cache-iso.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        & "C:\Program Files\7-Zip\7z.exe" x part.7z.001 -aoa

    - name: Padronizar ISO
      if: steps.cache-iso.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        $iso = Get-ChildItem *.iso | Select-Object -First 1
        Rename-Item $iso.Name source.iso

    - name: Limpar partes
      if: steps.cache-iso.outputs.cache-hit != 'true'
      shell: powershell
      run: Remove-Item *.7z* -Force

    # 🔹 VALIDAR
    - name: Validar ISO
      shell: powershell
      run: |
        if (!(Test-Path "source.iso")) { exit 1 }

    # 🔹 EXTRAIR
    - name: Criar work
      run: mkdir work

    - name: Extrair ISO
      shell: powershell
      run: |
        & "C:\Program Files\7-Zip\7z.exe" x source.iso -owork -aoa

    - name: Remover ISO
      shell: powershell
      run: Remove-Item source.iso -Force

    - name: Validar estrutura
      shell: powershell
      run: |
        if (!(Test-Path "work\sources\install.wim")) { exit 1 }

    # 🔥 MOUNT
    - name: Criar mount
      run: mkdir mount

    - name: Montar WIM
      shell: powershell
      run: |
        dism /Mount-Wim /WimFile:work\sources\install.wim /index:1 /MountDir:mount

    - name: Validar mount
      shell: powershell
      run: |
        if (!(Test-Path "mount\Windows")) { exit 1 }

    # 🔥 (AQUI ENTRA W10UI FUTURO)

    # 🔥 UNMOUNT
    - name: Unmount commit
      shell: powershell
      run: |
        dism /Unmount-Wim /MountDir:mount /Commit

    # 🔥 CRIAR ISO
    - name: Instalar ADK
      run: choco install windows-adk -y

    - name: Criar ISO final
      shell: powershell
      run: |
        $oscdimg = "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools\amd64\Oscdimg\oscdimg.exe"
        & $oscdimg -bwork\boot\etfsboot.com -u2 -h -m -o -lWIN10_LTSC_CUSTOM work final.iso

    # 🔥 SPLIT EM PARTES 1900MB
    - name: Dividir ISO (1900MB)
      shell: powershell
      run: |
        & "C:\Program Files\7-Zip\7z.exe" a -t7z split.7z final.iso -v1900m

    # 🔥 LIMPAR ISO GRANDE
    - name: Remover ISO grande
      shell: powershell
      run: Remove-Item final.iso -Force

    # 📦 UPLOAD PARTES
    - name: Upload partes
      uses: actions/upload-artifact@v4
      with:
        name: Windows-LTSC-SPLIT
        path: split.7z.*
