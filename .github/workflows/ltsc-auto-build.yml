name: LTSC AUTO BUILD (UUP AUTO + ESD + SPLIT)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:

    # ================================
    # 🔹 CACHE ISO BASE
    # ================================
    - name: Cache ISO
      id: cache-iso
      uses: actions/cache@v4
      with:
        path: source.iso
        key: ltsc-iso-v1

    # ================================
    # 🔹 DOWNLOAD ISO BASE
    # ================================
    - name: Baixar ISO partes
      if: steps.cache-iso.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        Invoke-WebRequest "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.001" -OutFile part.7z.001
        Invoke-WebRequest "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.002" -OutFile part.7z.002
        Invoke-WebRequest "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.003" -OutFile part.7z.003

    # ================================
    # 🔹 7ZIP
    # ================================
    - name: Instalar 7zip
      run: choco install 7zip -y

    - name: Extrair ISO
      if: steps.cache-iso.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        & "C:\Program Files\7-Zip\7z.exe" x part.7z.001 -aoa

    - name: Padronizar ISO
      if: steps.cache-iso.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        $iso = Get-ChildItem *.iso | Select-Object -First 1
        Rename-Item $iso.Name source.iso

    # ================================
    # 🔹 EXTRAIR ISO
    # ================================
    - name: Criar pasta work
      run: mkdir work

    - name: Extrair ISO
      shell: powershell
      run: |
        & "C:\Program Files\7-Zip\7z.exe" x source.iso -owork -aoa

    # 🔹 BACKUP ORIGINAL
    - name: Backup WIM
      shell: powershell
      run: |
        Copy-Item work\sources\install.wim work\sources\install_original.wim

    # ================================
    # 🔥 UUP AUTOMÁTICO (SEM ERRO)
    # ================================
    - name: Clonar UUP dump
      run: git clone https://github.com/uup-dump/uup-dump.git uup

    - name: Baixar updates automaticamente
      shell: powershell
      run: |
        cd uup
        cmd /c uup_download_windows.cmd

    # ================================
    # 🔥 MOUNT
    # ================================
    - name: Criar mount
      run: mkdir mount

    - name: Montar WIM
      shell: powershell
      run: |
        dism /Mount-Wim /WimFile:work\sources\install.wim /index:1 /MountDir:mount

    # ================================
    # 🔥 INTEGRAR UPDATES
    # ================================
    - name: Integrar updates
      shell: powershell
      run: |
        dism /Image:mount /Add-Package /PackagePath:uup

    # ================================
    # 🔥 CLEANUP HARD
    # ================================
    - name: Limpeza
      shell: powershell
      run: |
        dism /Image:mount /Cleanup-Image /StartComponentCleanup /ResetBase

    # ================================
    # 🔥 UNMOUNT
    # ================================
    - name: Commit
      shell: powershell
      run: |
        dism /Unmount-Wim /MountDir:mount /Commit

    # ================================
    # 🔥 CONVERTER PRA ESD
    # ================================
    - name: Converter ESD
      shell: powershell
      run: |
        dism /Export-Image /SourceImageFile:work\sources\install.wim `
        /SourceIndex:1 `
        /DestinationImageFile:work\sources\install.esd `
        /Compress:recovery

        Remove-Item work\sources\install.wim -Force

    # ================================
    # 🔥 CRIAR ISO
    # ================================
    - name: Instalar ADK
      run: choco install windows-adk -y

    - name: Criar ISO
      shell: powershell
      run: |
        $oscdimg = "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools\amd64\Oscdimg\oscdimg.exe"

        & $oscdimg -bwork\boot\etfsboot.com -u2 -h -m -o -lLTSC_FINAL work final.iso

    # ================================
    # 🔥 SPLIT 1900MB
    # ================================
    - name: Dividir ISO
      shell: powershell
      run: |
        & "C:\Program Files\7-Zip\7z.exe" a split.7z final.iso -v1900m

    - name: Remover ISO
      run: del final.iso

    # ================================
    # 📦 UPLOAD
    # ================================
    - name: Upload partes
      uses: actions/upload-artifact@v4
      with:
        name: LTSC-FINAL
        path: split.7z.*
