name: LTSC AUTO BUILD (FINAL ENTERPRISE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:

    # ================================
    # 🔹 CACHE ISO
    # ================================
    - name: Cache ISO
      id: cache-iso
      uses: actions/cache@v4
      with:
        path: source.iso
        key: ltsc-iso-v1

    # ================================
    # 🔥 DOWNLOAD ISO
    # ================================
    - name: Baixar ISO
      if: steps.cache-iso.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        curl.exe -L -o part.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.001
        curl.exe -L -o part.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.002
        curl.exe -L -o part.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.003

    - name: Instalar 7zip
      run: choco install 7zip -y

    - name: Extrair ISO base
      if: steps.cache-iso.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        & "C:\Program Files\7-Zip\7z.exe" x part.7z.001 -aoa

    - name: Padronizar ISO
      if: steps.cache-iso.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        $iso = Get-ChildItem *.iso | Select-Object -First 1
        Rename-Item $iso.Name source.iso

    # ================================
    # 🔥 EXTRAIR ISO
    # ================================
    - name: Criar work
      run: mkdir work

    - name: Extrair ISO
      shell: powershell
      run: |
        & "C:\Program Files\7-Zip\7z.exe" x source.iso -owork -aoa

    - name: Remover ISO
      run: del source.iso

    # 🔹 BACKUP
    - name: Backup WIM
      run: copy work\sources\install.wim work\sources\install_original.wim

    # ================================
    # 🔥 BAIXAR HTML UUP
    # ================================
    - name: Baixar página UUP
      shell: powershell
      run: |
        curl.exe -L "https://uupdump.net/get.php?id=1405899d-8302-4010-ad25-3ad906c62200&pack=0&edition=updateOnly" -o uup.html

    # ================================
    # 🔥 DOWNLOAD + RENAME CABs
    # ================================
    - name: Baixar CABs corretamente
      shell: powershell
      run: |
        mkdir updates
        $html = Get-Content uup.html -Raw

        $links = [regex]::Matches($html, 'href="(http://tlu.dl.delivery.mp.microsoft.com/filestreamingservice/files/[^"]+)"')
        $names = [regex]::Matches($html, 'rename "([^"]+)" "([^"]+)"')

        for ($i = 0; $i -lt $links.Count; $i++) {
          $url = $links[$i].Groups[1].Value
          $name = $names[$i].Groups[2].Value
          curl.exe -L $url -o "updates\$name"
        }

    # ================================
    # 🔥 MOUNT
    # ================================
    - name: Criar mount
      run: mkdir mount

    - name: Montar WIM
      shell: powershell
      run: |
        dism /Mount-Wim /WimFile:work\sources\install.wim /index:1 /MountDir:mount

    # ================================
    # 🔥 INTEGRAÇÃO ORDENADA
    # ================================
    - name: Integrar SSU
      shell: powershell
      run: |
        $ssu = Get-ChildItem updates | Where-Object {$_.Name -like "*SSU*"}
        dism /Image:mount /Add-Package /PackagePath:$ssu.FullName

    - name: Integrar Enablement
      shell: powershell
      run: |
        $en = Get-ChildItem updates | Where-Object {$_.Name -like "*KB5003791*"}
        dism /Image:mount /Add-Package /PackagePath:$en.FullName

    - name: Integrar restantes
      shell: powershell
      run: |
        $rest = Get-ChildItem updates | Where-Object {
          $_.Name -notlike "*SSU*" -and $_.Name -notlike "*KB5003791*"
        }

        foreach ($pkg in $rest) {
          dism /Image:mount /Add-Package /PackagePath:$pkg.FullName
        }

    # ================================
    # 🔥 CLEAN
    # ================================
    - name: Cleanup
      shell: powershell
      run: |
        dism /Image:mount /Cleanup-Image /StartComponentCleanup /ResetBase

    # ================================
    # 🔥 UNMOUNT
    # ================================
    - name: Commit
      shell: powershell
      run: |
        dism /Unmount-Wim /MountDir:mount /Commit

    # ================================
    # 🔥 VALIDAR + CAPTURAR VERSÃO
    # ================================
    - name: Validar versão e capturar build
      id: version
      shell: powershell
      run: |
        mkdir verify
        dism /Mount-Wim /WimFile:work\sources\install.wim /index:1 /MountDir:verify

        reg load HKLM\OFFSOFT verify\Windows\System32\Config\SOFTWARE

        $build = (Get-ItemProperty "HKLM:\OFFSOFT\Microsoft\Windows NT\CurrentVersion").CurrentBuild
        $ubr = (Get-ItemProperty "HKLM:\OFFSOFT\Microsoft\Windows NT\CurrentVersion").UBR

        $full = "$build.$ubr"
        echo "version=$full" >> $env:GITHUB_OUTPUT

        if ($ubr -lt 7184) {
          Write-Error "Update não aplicado corretamente!"
          exit 1
        }

        reg unload HKLM\OFFSOFT
        dism /Unmount-Wim /MountDir:verify /Discard

    # 🔥 LIMPAR UPDATES
    - name: Limpar updates
      run: rmdir /s /q updates

    # ================================
    # 🔥 ESD
    # ================================
    - name: Converter ESD
      shell: powershell
      run: |
        dism /Export-Image /SourceImageFile:work\sources\install.wim `
        /SourceIndex:1 `
        /DestinationImageFile:work\sources\install.esd `
        /Compress:recovery

        del work\sources\install.wim

    # ================================
    # 🔥 ISO COM NOME DINÂMICO
    # ================================
    - name: Instalar ADK
      run: choco install windows-adk -y

    - name: Criar ISO
      shell: powershell
      run: |
        $ver = "${{ steps.version.outputs.version }}"
        $label = "WIN10_LTSC_$ver"
        $isoName = "Windows 10 LTSC 21H2 ($ver).iso"

        $oscdimg = "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools\amd64\Oscdimg\oscdimg.exe"

        & $oscdimg -bwork\boot\etfsboot.com -u2 -h -m -o -l$label work "$isoName"

    # 🔥 LIMPAR WORK
    - name: Limpar work
      run: rmdir /s /q work

    # ================================
    # 🔥 SPLIT 1900MB
    # ================================
    - name: Split ISO
      shell: powershell
      run: |
        $file = Get-ChildItem *.iso | Select-Object -First 1
        & "C:\Program Files\7-Zip\7z.exe" a split.7z $file.Name -v1900m
        del $file.Name

    # ================================
    # 📦 UPLOAD FINAL
    # ================================
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: LTSC-FINAL
        path: split.7z.*
