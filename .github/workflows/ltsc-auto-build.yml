name: BUILD ISO LTSC FINAL (SAFE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # BASE
      - name: Criar estrutura
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path C:\Files | Out-Null
          New-Item -ItemType Directory -Force -Path work | Out-Null

      # ISO
      - name: Baixar ISO
        shell: powershell
        run: |
          Set-Location work
          curl -L -o W10LTSC2021.7z.001 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.001
          curl -L -o W10LTSC2021.7z.002 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.002
          curl -L -o W10LTSC2021.7z.003 https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.003

      - name: Extrair ISO
        shell: powershell
        run: |
          Set-Location work
          7z x W10LTSC2021.7z.001 -oiso

      - name: Mover ISO
        shell: powershell
        run: |
          $iso = Get-ChildItem work\iso\*.iso | Select-Object -First 1
          Move-Item $iso.FullName C:\Files\ -Force

      - name: Limpar partes
        shell: powershell
        run: |
          Remove-Item work\W10LTSC2021.7z.* -Force -ErrorAction SilentlyContinue

      # W10UI
      - name: Baixar W10UI
        shell: powershell
        run: |
          Set-Location work
          curl -L -o W10UI.zip https://tiny.cc/W10UI

      - name: Extrair W10UI
        shell: powershell
        run: |
          7z x work\W10UI.zip -oC:\Files

      - name: Limpar zip
        shell: powershell
        run: |
          Remove-Item work\W10UI.zip -Force

      # DRIVER
      - name: Baixar driver NVIDIA
        shell: powershell
        run: |
          Set-Location work
          curl -L -o nvidia.exe https://us.download.nvidia.com/Windows/341.92/341.92-desktop-win10-64bit-international.exe

      - name: Extrair driver
        shell: powershell
        run: |
          7z x work\nvidia.exe -owork\nvidia

      - name: Copiar driver
        shell: powershell
        run: |
          $dest = "C:\Files\Drivers\OS"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item "work\nvidia\Display.Driver" -Destination $dest -Recurse -Force

      - name: Limpar driver
        shell: powershell
        run: |
          Remove-Item work\nvidia -Recurse -Force
          Remove-Item work\nvidia.exe -Force

      # INI (SEM BLOCO MULTILINHA)
      - name: Criar W10UI.ini
        shell: powershell
        run: |
          $iso = (Get-ChildItem C:\Files\*.iso | Select-Object -First 1).FullName
          $iniPath = "C:\Files\W10UI.ini"

          Set-Content $iniPath "[W10UI-Configuration]"
          Add-Content $iniPath "ISO=1"
          Add-Content $iniPath "ISODir=$iso"
          Add-Content $iniPath ""
          Add-Content $iniPath "AutoStart=1"
          Add-Content $iniPath "AddUpdates=1"
          Add-Content $iniPath "AddDrivers=1"
          Add-Content $iniPath ""
          Add-Content $iniPath "Cleanup=1"
          Add-Content $iniPath "ResetBase=1"
          Add-Content $iniPath ""
          Add-Content $iniPath "Net35=1"
          Add-Content $iniPath "wim2esd=1"
          Add-Content $iniPath ""
          Add-Content $iniPath "Drv_Source=\Drivers"

      # DEBUG
      - name: Verificar estrutura
        shell: powershell
        run: |
          Write-Host "FILES:"
          Get-ChildItem C:\Files
          Write-Host "DRIVERS:"
          Get-ChildItem C:\Files\Drivers\OS

      # EXECUÇÃO
      - name: Executar W10UI
        shell: powershell
        run: |
          Set-Location C:\Files
          cmd /c W10UI.cmd

      # OUTPUT
      - name: Organizar ISO
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path output | Out-Null
          Move-Item C:\Files\*.iso output\ -Force

      - name: Compactar ISO
        shell: powershell
        run: |
          Set-Location output
          7z a -v1900m FINAL_LTSC.7z *.iso

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ISO_FINAL
          path: output\*.7z
