name: Windows Pro ISO Auto Build (STABLE FINAL)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Baixar script UUP
      shell: cmd
      run: |
        curl -L -o uup.cmd "https://uup.rg-adguard.net/api/GetFiles?id=59fd22e9-ef3d-4734-8a78-4354718ad854&lang=pt-br&edition=professional&script=yes"

    - name: Baixar aria2
      shell: cmd
      run: |
        curl -L -o aria2.zip https://uup.rg-adguard.net/dl/aria2_install.zip
        powershell -Command "Expand-Archive aria2.zip -DestinationPath aria2"
        copy aria2\aria2c.exe .

    - name: Download UUP com retry
      shell: cmd
      run: |
        set retries=3

        :retry
        call uup.cmd

        if exist uup (
          echo Download OK
        ) else (
          set /a retries-=1
          if %retries% GTR 0 goto retry
          echo Falha no download
          exit /b 1
        )

    - name: Validar arquivos
      shell: cmd
      run: |
        for /d %%i in (uup\*) do (
          dir %%i\*.esd >nul 2>&1 || exit /b 1
        )

    - name: Converter UUP (seguro)
      shell: cmd
      run: |
        for /d %%i in (uup\*) do (
          cd %%i

          echo set AutoStart=1>>ConvertConfig.ini
          echo set Cleanup=1>>ConvertConfig.ini
          echo set ResetBase=1>>ConvertConfig.ini
          echo set wim2esd=1>>ConvertConfig.ini
          echo set esdcompress=LZMS>>ConvertConfig.ini

          call convert-UUP.cmd

          cd ..
        )

    - name: Copiar ESD
      shell: cmd
      run: |
        mkdir final
        for /d %%i in (uup\*) do copy %%i\ISO\sources\install.esd final\install.esd

    - name: Split 1900MB
      shell: bash
      run: |
        mkdir split
        split -b 1900M final/install.esd split/install.esd.part-

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: win11-pro-stable
        name: Windows 11 Pro (ESD MAX STABLE)
        files: split/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
