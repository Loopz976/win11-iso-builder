name: Windows Pro ISO Auto Build (ESD MAX)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Definir variáveis
      shell: cmd
      run: |
        echo BUILD_ID=59fd22e9-ef3d-4734-8a78-4354718ad854>>%GITHUB_ENV%
        echo BUILD_VER=22631.6936>>%GITHUB_ENV%

    - name: Baixar pacote UUP (PRO)
      shell: cmd
      run: |
        curl -L -o uup.zip "https://uupdump.net/download.php?id=%BUILD_ID%&pack=pt-br&edition=professional"
        powershell -Command "Expand-Archive uup.zip -DestinationPath uup"

    - name: Configurar conversão (ESD máximo)
      shell: cmd
      run: |
        cd uup
        echo set AutoStart=1>>ConvertConfig.ini
        echo set Cleanup=1>>ConvertConfig.ini
        echo set ResetBase=1>>ConvertConfig.ini
        echo set NetFx3=0>>ConvertConfig.ini
        echo set StartVirtual=0>>ConvertConfig.ini
        echo set wim2esd=1>>ConvertConfig.ini
        echo set esdcompress=LZMS>>ConvertConfig.ini

    - name: Converter UUP → ISO + ESD
      shell: cmd
      run: |
        cd uup
        call convert-UUP.cmd

    - name: Preparar arquivos finais
      shell: cmd
      run: |
        mkdir final
        copy uup\ISO\sources\install.esd final\install.esd

    - name: Split 1900MB
      shell: bash
      run: |
        mkdir split
        split -b 1900M final/install.esd split/install.esd.part-

    - name: Criar Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: win11-pro-${{ env.BUILD_VER }}
        name: Windows 11 Pro ${{ env.BUILD_VER }} (ESD MAX AUTO)
        files: split/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
