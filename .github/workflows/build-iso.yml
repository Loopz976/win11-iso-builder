name: Windows Pro ISO Auto Build (FINAL FIX)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Baixar script UUP completo
      shell: cmd
      run: |
        curl -L -o uup.cmd "https://uup.rg-adguard.net/api/GetFiles?id=59fd22e9-ef3d-4734-8a78-4354718ad854&lang=pt-br&edition=professional&script=yes"

    - name: Baixar aria2
      shell: cmd
      run: |
        curl -L -o aria2.zip https://uup.rg-adguard.net/dl/aria2_install.zip
        powershell -Command "Expand-Archive aria2.zip -DestinationPath aria2"
        copy aria2\aria2c.exe .

    - name: Executar download UUP
      shell: cmd
      run: |
        call uup.cmd

    - name: Detectar pasta UUP
      shell: cmd
      run: |
        for /d %%i in (uup\*) do set UUPDIR=%%i
        echo UUPDIR=%UUPDIR%
        echo UUPDIR=%UUPDIR%>>%GITHUB_ENV%

    - name: Configurar conversão máxima
      shell: cmd
      run: |
        cd %UUPDIR%
        echo set AutoStart=1>>ConvertConfig.ini
        echo set Cleanup=1>>ConvertConfig.ini
        echo set ResetBase=1>>ConvertConfig.ini
        echo set wim2esd=1>>ConvertConfig.ini
        echo set esdcompress=LZMS>>ConvertConfig.ini

    - name: Converter UUP → ISO + ESD
      shell: cmd
      run: |
        cd %UUPDIR%
        call convert-UUP.cmd

    - name: Copiar install.esd
      shell: cmd
      run: |
        mkdir final
        copy %UUPDIR%\ISO\sources\install.esd final\install.esd

    - name: Split 1900MB
      shell: bash
      run: |
        mkdir split
        split -b 1900M final/install.esd split/install.esd.part-

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: win11-pro-final
        name: Windows 11 Pro (ESD MAX FINAL)
        files: split/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
