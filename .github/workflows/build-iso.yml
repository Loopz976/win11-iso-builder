name: Windows Pro ISO Auto Build (WORKING FINAL)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Baixar pacote UUP completo (FIX REAL)
      shell: cmd
      run: |
        curl -L -o uup.zip "https://uupdump.net/download.php?id=59fd22e9-ef3d-4734-8a78-4354718ad854&pack=pt-br&edition=professional"
        powershell -Command "Expand-Archive uup.zip -DestinationPath uup"

    - name: Rodar conversão automática
      shell: cmd
      run: |
        cd uup
        call uup_download_windows.cmd

    - name: Configurar compressão máxima
      shell: cmd
      run: |
        cd uup
        echo set wim2esd=1>>ConvertConfig.ini
        echo set esdcompress=LZMS>>ConvertConfig.ini

    - name: Converter ISO
      shell: cmd
      run: |
        cd uup
        call convert-UUP.cmd

    - name: Copiar install.esd
      shell: cmd
      run: |
        mkdir final
        copy uup\ISO\sources\install.esd final\install.esd

    - name: Split 1900MB
      shell: bash
      run: |
        mkdir split
        split -b 1900M final/install.esd split/install.esd.part-

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: win11-pro-ok
        name: Windows 11 Pro (ESD MAX FINAL OK)
        files: split/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
