name: Windows ISO Direct (FINAL ESTÁVEL)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Baixar ISO pronta (SUBSTITUA PELO SEU LINK)
    - name: Baixar ISO
      run: |
        curl -L -o windows.iso "COLE_AQUI_O_LINK_DA_ISO"

    # 2. Montar ISO
    - name: Montar ISO
      shell: powershell
      run: |
        Mount-DiskImage -ImagePath windows.iso
        $drive = (Get-DiskImage windows.iso | Get-Volume).DriveLetter
        echo "DRIVE=$drive:" >> $env:GITHUB_ENV

    # 3. Copiar conteúdo
    - name: Copiar arquivos
      run: |
        mkdir work
        xcopy %DRIVE%\* work /E /I /Y

    # 4. Converter WIM → ESD (compressão máxima)
    - name: Converter ESD MAX
      shell: cmd
      run: |
        dism /Export-Image ^
        /SourceImageFile:work\sources\install.wim ^
        /SourceIndex:1 ^
        /DestinationImageFile:work\sources\install.esd ^
        /Compress:recovery

    # 5. Remover WIM antigo
    - name: Limpeza
      run: |
        del work\sources\install.wim

    # 6. Split 1900MB
    - name: Dividir arquivo
      shell: bash
      run: |
        mkdir split
        split -b 1900M work/sources/install.esd split/install.esd.part-

    # 7. Upload Release
    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: win11-iso-direct
        name: Windows ISO Direct (ESD MAX)
        files: split/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
