name: Build Windows 11 ISO (UUP)

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest
timeout-minutes: 120

steps:
- name: 📥 Checkout do repositório
  uses: actions/checkout@v4

- name: 🧰 Instalar dependências
  run: |
    sudo apt update
    sudo apt install -y aria2 cabextract wimtools genisoimage unzip p7zip-full

- name: 📦 Encontrar e extrair ZIP do UUP
  run: |
    FILE=$(ls *.zip | head -n 1)
    echo "Usando pacote: $FILE"
    unzip "$FILE" -d uup

- name: 🚀 Rodar script do UUP (Linux)
  run: |
    cd uup
    chmod +x *.sh
    ./uup_download_linux.sh

- name: 🧱 Converter WIM → ESD (compressão máxima)
  run: |
    cd uup
    if [ -f install.wim ]; then
      echo "Convertendo para ESD..."
      sudo wimlib-imagex export install.wim all install.esd --compress=recovery
      rm install.wim
    else
      echo "install.wim não encontrado, pulando..."
    fi

- name: 📀 Recriar ISO otimizada
  run: |
    cd uup

    ISO_NAME="Win11_23H2_$(date +%Y%m%d)_Ultra.iso"

    genisoimage -o "$ISO_NAME" \
    -b boot/etfsboot.com \
    -no-emul-boot -boot-load-size 8 \
    -eltorito-alt-boot \
    -e efi/microsoft/boot/efisys.bin \
    -no-emul-boot \
    -udf -J -l .

    echo "ISO criada: $ISO_NAME"

- name: 📤 Upload como artifact (backup)
  uses: actions/upload-artifact@v4
  with:
    name: windows-iso
    path: uup/*.iso

- name: 🚀 Publicar no GitHub Releases
  uses: softprops/action-gh-release@v2
  with:
    tag_name: win11-${{ github.run_number }}
    name: Windows 11 23H2 Build ${{ github.run_number }}
    files: uup/*.iso
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
