name: Windows UUP Auto (SCRIPT FIXADO)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Baixar script completo
    - name: Baixar script multi
      run: |
        curl -L -o build.cmd "https://uup.rg-adguard.net/api/GetFiles?id=59fd22e9-ef3d-4734-8a78-4354718ad854&lang=pt-br&edition=professional&script=yes"

    # 2. Baixar binários necessários
    - name: Baixar bin
      run: |
        mkdir bin
        curl -L -o bin/aria2c.exe https://uup.rg-adguard.net/dl/aria2/aria2c_x86.exe

    # 3. FORÇAR CONFIGURAÇÃO AUTOMÁTICA
    - name: Patch automático no script
      shell: powershell
      run: |
        (Get-Content build.cmd) `
        -replace 'set update_en=OFF','set update_en=ON' `
        -replace 'set clean_en=OFF','set clean_en=ON' `
        -replace 'set esd_en=OFF','set esd_en=ON' `
        -replace 'set NetFx_en=OFF','set NetFx_en=OFF' `
        -replace 'set Lang_en=OFF','set Lang_en=OFF' `
        | Set-Content build_fixed.cmd

    # 4. Remover menu interativo
    - name: Remover menu
      shell: powershell
      run: |
        (Get-Content build_fixed.cmd) `
        -replace ':Menu[\s\S]*:DownListLang', ':DownListLang' `
        | Set-Content final.cmd

    # 5. Rodar script
    - name: Executar build
      shell: cmd
      run: |
        call final.cmd

    # 6. Upload (se gerar)
    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: win11-pro-auto
        name: Windows 11 Pro (AUTO BUILD)
        files: |
          uup/**/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
