name: Windows Pro ISO Auto Build (FINAL 100%)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Baixar pacote oficial correto
    - name: Baixar pacote UUP (estável)
      shell: cmd
      run: |
        curl -L -o uup.zip "https://uupdump.net/download.php?id=59fd22e9-ef3d-4734-8a78-4354718ad854&pack=pt-br&edition=professional"
        powershell -Command "Expand-Archive uup.zip -DestinationPath uup"

    # 2. Rodar download corretamente (script interno correto)
    - name: Baixar arquivos UUP
      shell: cmd
      run: |
        cd uup
        call aria2_download_windows.cmd

    # 3. Configurar compressão máxima
    - name: Configurar ESD máximo
      shell: cmd
      run: |
        cd uup
        echo set AutoStart=1>>ConvertConfig.ini
        echo set Cleanup=1>>ConvertConfig.ini
        echo set ResetBase=1>>ConvertConfig.ini
        echo set wim2esd=1>>ConvertConfig.ini
        echo set esdcompress=LZMS>>ConvertConfig.ini

    # 4. Converter
    - name: Converter ISO + ESD
      shell: cmd
      run: |
        cd uup
        call convert-UUP.cmd

    # 5. Copiar ESD
    - name: Copiar install.esd
      shell: cmd
      run: |
        mkdir final
        copy uup\ISO\sources\install.esd final\install.esd

    # 6. Split
    - name: Split 1900MB
      shell: bash
      run: |
        mkdir split
        split -b 1900M final/install.esd split/install.esd.part-

    # 7. Upload
    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: win11-pro-final-100
        name: Windows 11 Pro (ESD MAX FINAL 100%)
        files: split/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
