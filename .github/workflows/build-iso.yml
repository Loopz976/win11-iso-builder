name: Windows 11 Pro ISO (FINAL SEM BLOQUEIO)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Baixar pacote oficial direto do UUP dump (NÃO bloqueia)
    - name: Baixar pacote UUP
      run: |
        curl -L -o uup.zip "https://github.com/uup-dump/uup-dump/releases/latest/download/uupdump.zip"
        powershell -Command "Expand-Archive uup.zip -DestinationPath uup"

    # 2. Baixar arquivos oficiais da Microsoft
    - name: Download UUP (oficial)
      shell: cmd
      run: |
        cd uup
        call uup_download_windows.cmd

    # 3. Configurar compressão máxima
    - name: Configurar ESD MAX
      shell: cmd
      run: |
        cd uup
        echo set AutoStart=1>>ConvertConfig.ini
        echo set Cleanup=1>>ConvertConfig.ini
        echo set ResetBase=1>>ConvertConfig.ini
        echo set wim2esd=1>>ConvertConfig.ini
        echo set esdcompress=LZMS>>ConvertConfig.ini

    # 4. Converter
    - name: Converter ISO + ESD
      shell: cmd
      run: |
        cd uup
        call convert-UUP.cmd

    # 5. Copiar ESD
    - name: Preparar saída
      shell: cmd
      run: |
        mkdir final
        copy uup\ISO\sources\install.esd final\install.esd

    # 6. Split
    - name: Split 1900MB
      shell: bash
      run: |
        mkdir split
        split -b 1900M final/install.esd split/install.esd.part-

    # 7. Upload
    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: win11-pro-final-ok
        name: Windows 11 Pro (ESD MAX OK)
        files: split/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
