      run: echo OK

    # 🔽 TESTAR DOWNLOAD DAS PARTES
    - name: Baixar partes
      run: |
        curl -L -o part1.7z.001 "https://github.com/Loopz976/win11-iso-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.001"

