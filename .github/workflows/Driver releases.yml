name: TESTE FINAL Base Win10 LTSC

on:
  workflow_dispatch:

jobs:
  validar_base:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Instalar ferramentas
      run: choco install 7zip aria2 -y

    # LIMPAR
    - name: Limpar ambiente
      shell: powershell
      run: |
        if (Test-Path "Files") { Remove-Item -Recurse -Force "Files" }
        if (Test-Path "ISO_PARTS") { Remove-Item -Recurse -Force "ISO_PARTS" }
        if (Test-Path "ISO_EXTRACT") { Remove-Item -Recurse -Force "ISO_EXTRACT" }

    # ESTRUTURA
    - name: Criar estrutura
      run: |
        mkdir Files
        mkdir Files\ISO
        mkdir Files\Drivers\OS
        mkdir Files\Updates

    # W10UI
    - name: Extrair W10UI
      run: |
        7z x W10UI_10.59b.zip -oFiles -y

    # VALIDAR W10UI
    - name: Validar W10UI
      shell: powershell
      run: |
        Write-Host "=== W10UI ==="
        Get-ChildItem Files

        if (!(Test-Path "Files\W10UI.cmd")) {
          Write-Error "W10UI.cmd não encontrado"
          exit 1
        }

    # DRIVER
    - name: Baixar driver
      run: |
        aria2c -x16 -s16 "https://github.com/Loopz976/ltsc-auto-builder/releases/download/nvidia-driver-5/Display.Driver.zip"

    - name: Extrair driver
      run: |
        7z x Display.Driver.zip -oFiles\Drivers\OS -y

    # VALIDAR DRIVER
    - name: Validar driver
      shell: powershell
      run: |
        Write-Host "=== DRIVER ==="
        Get-ChildItem -Recurse Files\Drivers\OS

        $inf = Get-ChildItem -Recurse Files\Drivers\OS -Filter *.inf
        if (!$inf) {
          Write-Error "Nenhum arquivo .inf encontrado"
          exit 1
        }

    # ISO
    - name: Baixar ISO completa
      run: |
        mkdir ISO_PARTS
        cd ISO_PARTS
        aria2c -x16 -s16 "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.001"
        aria2c -x16 -s16 "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.002"
        aria2c -x16 -s16 "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc-2021-24459629943/W10LTSC2021.7z.003"

    - name: Ver partes ISO
      run: dir ISO_PARTS

    # EXTRAIR 7Z
    - name: Extrair pacote ISO
      run: |
        7z x ISO_PARTS\W10LTSC2021.7z.001 -oISO_EXTRACT -y

    # VALIDAR ISO GERADA
    - name: Validar ISO gerada
      run: dir ISO_EXTRACT

    # EXTRAIR ISO
    - name: Extrair ISO
      run: |
        7z x ISO_EXTRACT\*.iso -oFiles\ISO -y

    # VALIDAR ISO FINAL
    - name: Validar estrutura ISO
      shell: powershell
      run: |
        Write-Host "=== ISO ==="
        Get-ChildItem Files\ISO

        if (!(Test-Path "Files\ISO\sources\install.wim")) {
          Write-Error "install.wim não encontrado"
          exit 1
        }

    # ESTRUTURA FINAL
    - name: Estrutura final completa
      run: |
        dir Files
        dir Files\Drivers\OS
        dir Files\ISO\sources

    # TESTE DE COMPACTAÇÃO
    - name: Testar compactação 1900MB
      run: |
        7z a -t7z teste_base.7z Files\ -mx=9 -mmt=on -v1900m

    - name: Ver arquivos gerados
      run: |
        dir teste_base.7z.*
