name: Gerar Driver NVIDIA (Display.Driver)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_driver:
    runs-on: windows-latest

    steps:
    - name: Instalar 7zip
      run: choco install 7zip -y

    # 🔽 LIMPAR AMBIENTE
    - name: Limpar ambiente
      shell: powershell
      run: |
        if (Test-Path "Display.Driver") {
          Remove-Item -Recurse -Force "Display.Driver"
        }
        if (Test-Path "driver") {
          Remove-Item -Recurse -Force "driver"
        }
        if (Test-Path "Display.Driver.zip") {
          Remove-Item -Force "Display.Driver.zip"
        }

    # 🔽 BAIXAR DRIVER
    - name: Baixar driver NVIDIA
      run: |
        curl -L -o nvidia.exe "https://us.download.nvidia.com/Windows/342.01/342.01-desktop-win10-64bit-international.exe"

    # 🔽 EXTRAIR
    - name: Extrair driver
      run: |
        mkdir driver
        7z x nvidia.exe -odriver -y

    # 🔍 DEBUG INICIAL
    - name: Listar estrutura inicial
      run: dir driver

    # 🔽 PREPARAR Display.Driver
    - name: Preparar Display.Driver
      shell: powershell
      run: |
        $path = Get-ChildItem -Recurse -Directory -Filter "Display.Driver" | Select-Object -First 1

        if (-not $path) {
          Write-Error "Display.Driver NÃO encontrada!"
          exit 1
        }

        Move-Item $path.FullName -Destination "Display.Driver"

    # 🔍 DEBUG (NÃO QUEBRA MAIS)
    - name: Ver estrutura final (debug)
      shell: powershell
      run: |
        Write-Host "=== ESTRUTURA FINAL ==="
        Get-ChildItem -Recurse Display.Driver

        $inf = Get-ChildItem -Recurse Display.Driver -Filter *.inf
        $sys = Get-ChildItem -Recurse Display.Driver -Filter *.sys

        Write-Host "INF encontrados:" ($inf | Measure-Object).Count
        Write-Host "SYS encontrados:" ($sys | Measure-Object).Count

    # 🔽 COMPACTAR
    - name: Compactar
      run: |
        7z a Display.Driver.zip Display.Driver

    # 🔍 VALIDAR ZIP
    - name: Verificar ZIP
      run: |
        7z l Display.Driver.zip

    # 🚀 RELEASE
    - name: Criar Release
      uses: ncipollo/release-action@v1
      with:
        tag: nvidia-driver-${{ github.run_number }}
        name: NVIDIA Display.Driver
        artifacts: Display.Driver.zip
        token: ${{ secrets.GITHUB_TOKEN }}
