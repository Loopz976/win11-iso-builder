name: ISO Windows AUTO (11 + 10)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:

  win11:
    runs-on: windows-latest

    steps:
    - name: Baixar pacote UUP Win11
      shell: powershell
      run: |
        Invoke-WebRequest "https://uupdump.net/get.php?id=22631.1&pack=pt-br&edition=professional&arch=amd64" -OutFile uup.zip
        Expand-Archive uup.zip -DestinationPath uup -Force

    - name: Instalar aria2
      shell: powershell
      run: |
        choco install aria2 -y
        $aria = (Get-Command aria2c).Source
        Copy-Item $aria "uup\files\aria2c.exe" -Force

    - name: Executar UUP Win11
      shell: cmd
      working-directory: uup
      run: |
        uup_download_windows.cmd

    - name: Compactar ISO Win11
      shell: powershell
      run: |
        $iso = Get-ChildItem -Recurse -Filter *.iso | Select-Object -First 1
        7z a -tzip -v1800m WIN11.zip $iso.FullName

    - name: Release Win11
      uses: ncipollo/release-action@v1
      with:
        tag: win11-${{ github.run_number }}
        artifacts: WIN11.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}

  win10:
    needs: win11
    runs-on: windows-latest

    steps:
    - name: Baixar pacote UUP Win10
      shell: powershell
      run: |
        Invoke-WebRequest "https://uupdump.net/get.php?id=19045.1&pack=pt-br&edition=professional&arch=amd64&windows=10" -OutFile uup.zip
        Expand-Archive uup.zip -DestinationPath uup -Force

    - name: Instalar aria2
      shell: powershell
      run: |
        choco install aria2 -y
        $aria = (Get-Command aria2c).Source
        Copy-Item $aria "uup\files\aria2c.exe" -Force

    - name: Executar UUP Win10
      shell: cmd
      working-directory: uup
      run: |
        uup_download_windows.cmd

    - name: Compactar ISO Win10
      shell: powershell
      run: |
        $iso = Get-ChildItem -Recurse -Filter *.iso | Select-Object -First 1
        7z a -tzip -v1800m WIN10.zip $iso.FullName

    - name: Release Win10
      uses: ncipollo/release-action@v1
      with:
        tag: win10-${{ github.run_number }}
        artifacts: WIN10.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}
