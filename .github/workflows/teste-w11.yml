name: Teste pacote updates Win11

on:
  workflow_dispatch:

jobs:
  teste:
    runs-on: windows-latest

    steps:
    - name: Checkout repositório
      uses: actions/checkout@v4

    - name: Instalar 7zip
      run: choco install 7zip -y

    - name: Verificar arquivos na raiz
      shell: powershell
      run: |
        Write-Host "=== ARQUIVOS NA RAIZ ==="
        Get-ChildItem

    - name: Extrair pacote updates
      shell: powershell
      run: |
        if (!(Test-Path "22631.6936_amd64_updates_59fd22e9.zip")) {
          Write-Error "ZIP NÃO ENCONTRADO NA RAIZ!"
          exit 1
        }

        New-Item -ItemType Directory -Path updates -Force
        Expand-Archive -Path "22631.6936_amd64_updates_59fd22e9.zip" -DestinationPath "updates" -Force

    - name: Listar conteúdo extraído
      shell: powershell
      run: |
        Write-Host "=== CONTEÚDO EXTRAÍDO ==="
        Get-ChildItem -Recurse updates

    - name: Validar arquivos importantes
      shell: powershell
      run: |
        $cab = Get-ChildItem -Recurse updates -Filter *.cab
        $wim = Get-ChildItem -Recurse updates -Filter *.wim
        $psf = Get-ChildItem -Recurse updates -Filter *.psf

        if (!$cab) {
          Write-Error "Nenhum .cab encontrado!"
          exit 1
        }

        Write-Host "CAB encontrados:" $cab.Count
        Write-Host "WIM encontrados:" $wim.Count
        Write-Host "PSF encontrados:" $psf.Count

    - name: Preparar pasta final
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path final\Updates -Force

        Get-ChildItem -Recurse updates -Include *.cab, *.msu |
        Copy-Item -Destination final\Updates -Force

    - name: Verificar resultado final
      shell: powershell
      run: |
        Write-Host "=== UPDATES PRONTOS ==="
        Get-ChildItem final\Updates

        if (!(Get-ChildItem final\Updates)) {
          Write-Error "Nenhum update preparado!"
          exit 1
        }

    - name: Final
      run: echo "PACOTE OK - PRONTO PRA INTEGRAR"
