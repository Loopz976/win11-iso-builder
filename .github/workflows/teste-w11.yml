name: Testar pacote updates Win11

on:
  workflow_dispatch:

jobs:
  build_win11:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Instalar 7zip
      run: choco install 7zip -y

    # 🔽 CRIAR ESTRUTURA IGUAL UUP
    - name: Preparar pasta UUP
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path uup -Force

    # 🔽 EXTRAIR ZIP (CORRETO)
    - name: Extrair pacote updates
      shell: powershell
      run: |
        if (!(Test-Path "22631.6936_amd64_updates_59fd22e9.zip")) {
          Write-Error "ZIP NÃO ENCONTRADO!"
          Get-ChildItem
          exit 1
        }

        7z x "22631.6936_amd64_updates_59fd22e9.zip" -ouup -y

    # 🔍 DEBUG IGUAL UUP
    - name: Listar estrutura UUP
      shell: powershell
      run: |
        Write-Host "=== ESTRUTURA UUP ==="
        Get-ChildItem -Recurse uup

    # 🔽 VALIDAR PACOTE
    - name: Validar conteúdo
      shell: powershell
      run: |
        $cab = Get-ChildItem -Recurse uup -Filter *.cab

        if (!$cab) {
          Write-Error "Nenhum CAB encontrado - pacote inválido!"
          exit 1
        }

        Write-Host "CAB OK:" $cab.Count

    # 🔽 SIMULAR PASTA UPDATES (W10UI)
    - name: Preparar Updates
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path uup\Updates -Force

        Get-ChildItem -Recurse uup -Include *.cab, *.msu |
        Copy-Item -Destination uup\Updates -Force

    # 🔍 VALIDAR FINAL
    - name: Verificar Updates
      shell: powershell
      run: |
        Write-Host "=== UPDATES PRONTOS ==="
        Get-ChildItem uup\Updates

        if (!(Get-ChildItem uup\Updates)) {
          Write-Error "Falha ao preparar updates!"
          exit 1
        }

    - name: Final
      run: echo "PACOTE FUNCIONANDO 100%"
