name: Teste UUP Win11 (ZIP correto)

on:
  workflow_dispatch:

jobs:
  build_win11:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Instalar aria2
      shell: powershell
      run: |
        choco install aria2 -y

    - name: Preparar pasta
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path uup -Force

    - name: Extrair ZIP UUP
      shell: powershell
      run: |
        Expand-Archive -Path "uup11.zip" -DestinationPath "uup" -Force

        Write-Host "=== ARQUIVOS EXTRAÍDOS ==="
        Get-ChildItem -Recurse uup

    - name: Validar script UUP
      shell: powershell
      run: |
        if (!(Test-Path "uup\uup_download_windows.cmd")) {
          Write-Error "Script UUP NÃO encontrado!"
          exit 1
        }

    - name: Preparar aria2 no padrão UUP
      shell: powershell
      run: |
        $aria = (Get-Command aria2c).Source

        New-Item -ItemType Directory -Path "uup\files" -Force
        Copy-Item $aria "uup\files\aria2c.exe" -Force

        if (!(Test-Path "uup\files\aria2c.exe")) {
          Write-Error "aria2 não copiado!"
          exit 1
        }

    - name: Executar UUP (DOWNLOAD REAL)
      shell: cmd
      working-directory: uup
      run: |
        uup_download_windows.cmd

    - name: Verificar resultado
      shell: powershell
      run: |
        Write-Host "=== RESULTADO ==="
        Get-ChildItem -Recurse uup

        $esd = Get-ChildItem -Recurse uup -Filter *.esd
        if ($esd) {
          Write-Host "DOWNLOAD UUP OK"
        } else {
          Write-Error "Falha no download UUP"
          exit 1
        }
