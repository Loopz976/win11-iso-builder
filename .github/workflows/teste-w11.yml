name: Teste Updates Win11 (padrão UUP)

on:
  workflow_dispatch:

jobs:
  build_win11:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Instalar aria2
      shell: powershell
      run: |
        choco install aria2 -y

    - name: Extrair pacote (Win11)
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path uup -Force
        Expand-Archive -Path "22631.6936_amd64_updates_59fd22e9.zip" -DestinationPath "uup" -Force

        Write-Host "=== CONTEÚDO EXTRAÍDO ==="
        Get-ChildItem -Recurse uup

    - name: Preparar estrutura (igual UUP)
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path "uup\files" -Force

        $aria = (Get-Command aria2c).Source
        Copy-Item $aria "uup\files\aria2c.exe" -Force

        if (!(Test-Path "uup\files\aria2c.exe")) {
          Write-Error "aria2 não copiado corretamente!"
          exit 1
        }

    - name: Executar script do pacote (se existir)
      shell: cmd
      working-directory: uup
      run: |
        if exist *.cmd (
          echo Executando script do pacote...
          for %%f in (*.cmd) do call "%%f"
        ) else (
          echo Nenhum script .cmd encontrado
        )

    - name: Validar arquivos (modo UUP adaptado)
      shell: powershell
      run: |
        $cab = Get-ChildItem -Recurse uup -Filter *.cab
        $psf = Get-ChildItem -Recurse uup -Filter *.psf
        $wim = Get-ChildItem -Recurse uup -Filter *.wim

        if (!$cab -and !$psf -and !$wim) {
          Write-Error "Nenhum arquivo válido encontrado!"
          exit 1
        }

        Write-Host "CAB:" $cab.Count
        Write-Host "PSF:" $psf.Count
        Write-Host "WIM:" $wim.Count

    - name: Compactar pacote teste
      shell: powershell
      run: |
        7z a -tzip -v1000m pacote_teste.zip uup\*

    - name: Criar Release
      uses: ncipollo/release-action@v1
      with:
        tag: teste-${{ github.run_number }}
        name: Teste Updates Win11
        artifacts: pacote_teste.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}
