name: Teste ISO Windows 11

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Baixar repositório
      uses: actions/checkout@v4

    - name: Listar arquivos (debug)
      run: dir

    - name: Extrair uup11.zip
      shell: powershell
      run: |
        if (!(Test-Path "uup11.zip")) {
          Write-Error "uup11.zip NÃO encontrado na raiz!"
          exit 1
        }
        Expand-Archive "uup11.zip" -DestinationPath "uup" -Force

    - name: Instalar aria2
      shell: powershell
      run: |
        choco install aria2 -y
        $aria = (Get-Command aria2c).Source
        Copy-Item $aria "uup\files\aria2c.exe" -Force

    - name: Executar script UUP
      shell: cmd
      working-directory: uup
      run: |
        uup_download_windows.cmd

    - name: Procurar ISO
      shell: powershell
      run: |
        $iso = Get-ChildItem -Recurse -Filter *.iso | Select-Object -First 1
        if (!$iso) {
          Write-Error "ISO não encontrada!"
          exit 1
        }
        Move-Item $iso.FullName WIN11.iso

    - name: Compactar ISO
      shell: powershell
      run: |
        7z a -tzip -v1800m WIN11.zip WIN11.iso

    - name: Criar release
      uses: ncipollo/release-action@v1
      with:
        tag: teste-${{ github.run_number }}
        artifacts: WIN11.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}
