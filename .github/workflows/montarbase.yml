name: Build ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar pasta ISO
        run: |
          mkdir Files\ISO

      - name: Copiar arquivos da base
        run: |
          xcopy /E /I /Y Base\* Files\ISO\

      - name: Validar ISO (WIM ou ESD)
        shell: powershell
        run: |
          if (!(Test-Path "Files\ISO\sources\install.wim") -and !(Test-Path "Files\ISO\sources\install.esd")) {
            Write-Error "ISO inválida (sem install.wim ou install.esd)"
            exit 1
          } else {
            Write-Host "ISO válida encontrada"
          }

      - name: Listar conteúdo (debug)
        run: |
          dir Files\ISO\sources

      - name: Compactar ISO
        run: |
          powershell Compress-Archive -Path Files\ISO\* -DestinationPath output.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ISO_BUILD
          path: output.zip
