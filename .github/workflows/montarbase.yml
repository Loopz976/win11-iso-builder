name: Validate Release Base

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Criar pasta de trabalho
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "work" | Out-Null

      - name: Baixar partes do release
        shell: powershell
        run: |
          cd work

          Invoke-WebRequest "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.001" -OutFile "base.7z.001"
          Invoke-WebRequest "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.002" -OutFile "base.7z.002"
          Invoke-WebRequest "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.003" -OutFile "base.7z.003"

      - name: Instalar 7zip
        run: choco install 7zip -y

      - name: Extrair base completa
        shell: powershell
        run: |
          cd work
          7z x base.7z.001 -oextracted

      - name: Validar estrutura completa
        shell: powershell
        run: |
          $root = "work\extracted\Files"

          if (!(Test-Path $root)) {
            Write-Error "Files não encontrado"
            exit 1
          }

          # W10UI (arquivo principal)
          if (!(Test-Path "$root\W10UI.cmd")) {
            Write-Error "W10UI não encontrado na raiz"
            exit 1
          }

          # ISO
          if (!(Test-Path "$root\ISO\sources\install.wim") -and !(Test-Path "$root\ISO\sources\install.esd")) {
            Write-Error "ISO inválida (sem install.wim/esd)"
            exit 1
          }

          # Drivers
          if (!(Test-Path "$root\Drivers\OS\Display.Driver")) {
            Write-Error "Drivers NVIDIA não encontrados"
            exit 1
          }

          # Updates
          if (!(Test-Path "$root\Updates")) {
            Write-Error "Pasta Updates não encontrada"
            exit 1
          }

          Write-Host "VALIDAÇÃO OK - BASE 100% INTACTA"
