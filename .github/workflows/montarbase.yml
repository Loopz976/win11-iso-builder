name: Inspect Base Structure

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: windows-latest

    steps:
    - name: Instalar dependências
      shell: powershell
      run: |
        choco install aria2 -y
        choco install 7zip -y

    - name: Criar pasta de trabalho
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path "work" | Out-Null

    - name: Baixar partes
      shell: powershell
      run: |
        cd work
        aria2c -x 16 -s 16 -k 1M -d . -o base.7z.001 "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.001"
        aria2c -x 16 -s 16 -k 1M -d . -o base.7z.002 "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.002"
        aria2c -x 16 -s 16 -k 1M -d . -o base.7z.003 "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.003"

    - name: Extrair base
      shell: powershell
      run: |
        cd work
        7z x base.7z.001 -oextracted

    - name: LISTAR TUDO (raiz completa)
      shell: powershell
      run: |
        Write-Host "===== RAIZ EXTRAIDA ====="
        Get-ChildItem -Path "work\extracted"

        Write-Host "===== BUSCANDO FILES ====="
        Get-ChildItem -Recurse -Directory -Filter "Files" "work\extracted"

        Write-Host "===== LISTANDO FILES (SE EXISTIR) ====="
        $files = Get-ChildItem -Recurse -Directory -Filter "Files" "work\extracted" | Select-Object -First 1

        if ($files) {
          Write-Host "Files encontrado em: $($files.FullName)"

          Write-Host "===== RAIZ FILES ====="
          Get-ChildItem $files.FullName

          Write-Host "===== ISO ====="
          if (Test-Path "$($files.FullName)\ISO") {
            Get-ChildItem "$($files.FullName)\ISO"
          }

          Write-Host "===== DRIVERS ====="
          if (Test-Path "$($files.FullName)\Drivers") {
            Get-ChildItem "$($files.FullName)\Drivers"
          }
        }
        else {
          Write-Host "⚠️ Pasta Files NÃO encontrada"
        }
