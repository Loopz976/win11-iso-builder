name: Validate W10 LTSC Base Full

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest

    steps:
    - name: Instalar dependências
      shell: powershell
      run: |
        choco install aria2 -y
        choco install 7zip -y

    - name: Criar pasta de trabalho
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path "work" | Out-Null

    - name: Baixar partes do release (aria2 ultra rápido)
      shell: powershell
      run: |
        cd work

        aria2c -x 16 -s 16 -k 1M -d . -o base.7z.001 "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.001"
        aria2c -x 16 -s 16 -k 1M -d . -o base.7z.002 "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.002"
        aria2c -x 16 -s 16 -k 1M -d . -o base.7z.003 "https://github.com/Loopz976/ltsc-auto-builder/releases/download/w10-ltsc21h2-base-2/Win10LTSC21H2Base.7z.003"

    - name: Extrair base completa
      shell: powershell
      run: |
        cd work
        7z x base.7z.001 -oextracted

    - name: Validar estrutura completa
      shell: powershell
      run: |
        $root = "work\extracted\Files"

        if (!(Test-Path $root)) {
          Write-Error "Files não encontrado"
          exit 1
        }

        if (!(Test-Path "$root\W10UI.cmd")) {
          Write-Error "W10UI não encontrado na raiz"
          exit 1
        }

        if (!(Test-Path "$root\ISO\sources\install.wim") -and !(Test-Path "$root\ISO\sources\install.esd")) {
          Write-Error "ISO inválida (sem install.wim/esd)"
          exit 1
        }

        if (!(Test-Path "$root\Drivers\OS\Display.Driver")) {
          Write-Error "Drivers NVIDIA não encontrados"
          exit 1
        }

        if (!(Test-Path "$root\Updates")) {
          Write-Error "Pasta Updates não encontrada"
          exit 1
        }

        Write-Host "VALIDAÇÃO OK - BASE 100% INTACTA"
