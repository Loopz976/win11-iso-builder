name: Build ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar estrutura
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "Files\ISO" | Out-Null

      - name: Copiar base para ISO
        shell: powershell
        run: |
          if (!(Test-Path "Base")) {
            Write-Error "Pasta Base não encontrada no repositório"
            exit 1
          }

          Copy-Item -Path "Base\*" -Destination "Files\ISO" -Recurse -Force

      - name: Validar ISO (WIM ou ESD)
        shell: powershell
        run: |
          $wim = Test-Path "Files\ISO\sources\install.wim"
          $esd = Test-Path "Files\ISO\sources\install.esd"

          if (-not ($wim -or $esd)) {
            Write-Error "ISO inválida: não contém install.wim nem install.esd"
            exit 1
          }

          Write-Host "ISO válida encontrada"

      - name: Debug - listar sources
        shell: powershell
        run: |
          Get-ChildItem -Path "Files\ISO\sources"

      - name: Compactar saída
        shell: powershell
        run: |
          Compress-Archive -Path "Files\ISO\*" -DestinationPath "output.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ISO_BUILD
          path: output.zip
