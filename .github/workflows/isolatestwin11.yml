name: Build Windows 11 ISO (Optimized)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 📦 Extrair script
      - name: Extract files
        run: |
          tar -xf script.zip

      # 🔧 Patch script (remove interação)
      - name: Patch script
        shell: powershell
        run: |
          $file = Get-ChildItem -Filter *.cmd | Select-Object -First 1
          $content = Get-Content $file.FullName
          $content = $content -replace 'CHOICE /c fs.*', 'set ListSel=F'
          $content | Set-Content "script_auto.cmd"

      # 🚀 Executar script (gera todas ISOs)
      - name: Run script
        run: |
          cmd /c script_auto.cmd

      # 📂 Criar pasta output
      - name: Create output
        run: mkdir output

      # 🔥 PROCESSAR UMA ISO POR VEZ (evita estourar espaço)
      - name: Process ISOs safely
        shell: cmd
        run: |
          for %%f in (*.iso) do (
            echo %%f | findstr /i "pt-br" >nul
            if not errorlevel 1 (
              echo Processando %%f

              move "%%f" output\

              cd output

              echo Compactando %%f
              7z a -v1900m -mx=0 "%%~nf.7z" "%%f"

              echo Removendo ISO
              del "%%f"

              cd ..
            )
          )

      # 🔥 Deletar release antigo (overwrite real)
      - name: Delete old release
        continue-on-error: true
        run: |
          gh release delete win11-23h2-22631.6060 --yes

      # 🚀 Upload final
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: win11-23h2-22631.6060
          name: Windows 11 23H2 22631.6060 PT-BR
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
