name: Build Windows 11 ISO (AUTO)

on:
workflow_dispatch:

jobs:
build:
runs-on: windows-latest

steps:
- name: Checkout
  uses: actions/checkout@v4

- name: Extrair ZIP UUP
  shell: powershell
  run: |
    Expand-Archive -Path "22631.6936_amd64_pt-br_professional_59fd22e9_convert.zip" -DestinationPath "." -Force

    $folder = Get-ChildItem -Directory | Where-Object { $_.Name -like "*22631*" } | Select-Object -First 1
    Rename-Item $folder.Name "uup"

- name: Corrigir script aria2
  shell: powershell
  run: |
    $script = "uup/files/get_aria2.ps1"
    if (Test-Path $script) {
      Set-Content -Path $script -Value "exit 0"
    }

- name: Rodar UUP Dump
  shell: cmd
  working-directory: uup
  run: |
    uup_download_windows.cmd

- name: Localizar ISO
  id: findiso
  shell: powershell
  run: |
    $iso = Get-ChildItem -Recurse -Filter *.iso | Select-Object -First 1
    if (-not $iso) { 
      Write-Error "ISO não encontrada"
      exit 1 
    }
    echo "ISO=$($iso.FullName)" >> $env:GITHUB_OUTPUT

- name: Compactar ISO (dividir)
  shell: powershell
  run: |
    7z a -tzip -v1800m WIN11.zip "${{ steps.findiso.outputs.ISO }}"

- name: Upload Release
  uses: ncipollo/release-action@v1
  with:
    tag: win11-${{ github.run_number }}
    name: Windows 11 Build Auto
    artifacts: WIN11.zip.*
    token: ${{ secrets.GITHUB_TOKEN }}
