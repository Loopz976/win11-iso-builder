name: Build Windows 11 ISO

on:
  workflow_dispatch:

jobs:
  build_win11:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Instalar aria2
      shell: powershell
      run: |
        choco install aria2 -y

    - name: Extrair pacote UUP
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path uup -Force
        Expand-Archive -Path "22631.6936_amd64_pt-br_professional_59fd22e9_convert.zip" -DestinationPath "uup" -Force

    - name: Copiar aria2 para pasta correta
      shell: powershell
      run: |
        $aria = (Get-Command aria2c).Source
        if (!(Test-Path "uup\files")) {
          New-Item -ItemType Directory -Path "uup\files" -Force
        }
        Copy-Item $aria "uup\files\aria2c.exe" -Force

    - name: Executar script UUP
      shell: cmd
      working-directory: uup
      run: |
        uup_download_windows.cmd

    - name: Encontrar ISO gerada
      id: findiso
      shell: powershell
      run: |
        $iso = Get-ChildItem -Recurse -Filter *.iso | Select-Object -First 1
        if (-not $iso) {
          Write-Error "ISO não encontrada!"
          exit 1
        }
        echo "iso_path=$($iso.FullName)" >> $env:GITHUB_OUTPUT

    - name: Dividir ISO (1.8GB)
      shell: powershell
      run: |
        7z a -tzip -v1800m "WIN11_ISO_PARTS.zip" "${{ steps.findiso.outputs.iso_path }}"

    - name: Criar release e enviar ISO
      uses: ncipollo/release-action@v1
      with:
        tag: win11-${{ github.run_id }}
        name: Windows 11 ISO Build ${{ github.run_id }}
        artifacts: WIN11_ISO_PARTS.zip.*
        token: ${{ secrets.GITHUB_TOKEN }}
