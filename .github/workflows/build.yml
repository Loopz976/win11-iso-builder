name: Win11 PRO W10UI FINAL ABSOLUTO

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 420

    steps:
      - uses: actions/checkout@v4

      # 7ZIP
      - name: Instalar 7zip
        run: choco install 7zip -y

      # PASTAS
      - name: Preparar ambiente
        shell: powershell
        run: |
          mkdir C:\work
          mkdir C:\base
          mkdir C:\ISO
          mkdir C:\out
          mkdir C:\drv
          mkdir C:\updates

      # BASE
      - name: Baixar base
        shell: powershell
        run: |
          curl.exe -L -o C:\work\base.zip.001 https://github.com/Loopz976/win10-iso-auto-builder/releases/download/files-win11/filesw11.zip.001
          curl.exe -L -o C:\work\base.zip.002 https://github.com/Loopz976/win10-iso-auto-builder/releases/download/files-win11/filesw11.zip.002
          curl.exe -L -o C:\work\base.zip.003 https://github.com/Loopz976/win10-iso-auto-builder/releases/download/files-win11/filesw11.zip.003
          curl.exe -L -o C:\work\base.zip.004 https://github.com/Loopz976/win10-iso-auto-builder/releases/download/files-win11/filesw11.zip.004

      - name: Extrair base
        shell: powershell
        run: |
          & "C:\Program Files\7-Zip\7z.exe" x C:\work\base.zip.001 -oC:\base -y

      # LOCALIZAR
      - name: Localizar Files + ISO
        id: path
        shell: powershell
        run: |
          $files = Get-ChildItem C:\base -Recurse -Directory | Where {$_.Name -eq "Files"} | Select -First 1
          $iso = Get-ChildItem $files.FullName -Filter *.iso -Recurse | Select -First 1
          if (!$files -or !$iso) { throw "Erro base" }

          "files=$($files.FullName)" >> $env:GITHUB_OUTPUT
          "iso=$($iso.FullName)" >> $env:GITHUB_OUTPUT

      # EXTRAIR ISO
      - name: Extrair ISO
        shell: powershell
        run: |
          & "C:\Program Files\7-Zip\7z.exe" x "${{ steps.path.outputs.iso }}" -oC:\ISO -y

      # LIMPEZA INICIAL
      - name: Limpeza inicial
        shell: powershell
        run: |
          Remove-Item C:\work -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item C:\base\*.zip* -Force -ErrorAction SilentlyContinue
          Remove-Item $env:TEMP\* -Recurse -Force -ErrorAction SilentlyContinue

      # INDEX 4 PRO
      - name: Forçar PRO
        shell: powershell
        run: |
          dism /Export-Image `
          /SourceImageFile:C:\ISO\sources\install.wim `
          /SourceIndex:4 `
          /DestinationImageFile:C:\ISO\sources\install_pro.wim `
          /Compress:max

          Remove-Item C:\ISO\sources\install.wim
          Rename-Item C:\ISO\sources\install_pro.wim install.wim

      # DRIVER NVIDIA (SOMENTE OS)
      - name: Driver NVIDIA (OS only)
        shell: powershell
        run: |
          curl.exe -L -o C:\drv\nv.exe https://us.download.nvidia.com/Windows/342.01/342.01-desktop-win10-64bit-international.exe
          & "C:\Program Files\7-Zip\7z.exe" x C:\drv\nv.exe -oC:\drv\nv -y

          mkdir "${{ steps.path.outputs.files }}\Drivers\OS" -Force
          Copy-Item C:\drv\nv\Display.Driver "${{ steps.path.outputs.files }}\Drivers\OS" -Recurse -Force

          Remove-Item C:\drv -Recurse -Force

      # UPDATE MSU (KB MAIS RECENTE)
      - name: Baixar MSU com retry
        shell: powershell
        run: |
          $url = "https://catalog.s.download.windowsupdate.com/c/msdownload/update/software/updt/2026/04/windows11.0-kb5082052-x64.msu"
          $dest = "C:\updates\kb.msu"

          for ($i=0; $i -lt 5; $i++) {
            try {
              curl.exe -L -o $dest $url
              if ((Get-Item $dest).Length -gt 100MB) { break }
            } catch {}
            Start-Sleep -Seconds 5
          }

          if (!(Test-Path $dest)) { throw "Falha MSU" }

      - name: Copiar update
        shell: powershell
        run: |
          Copy-Item C:\updates\*.msu "${{ steps.path.outputs.files }}" -Force
          Remove-Item C:\updates -Recurse -Force

      # CONFIG W10UI (ABSOLUTO)
      - name: Configurar W10UI
        shell: powershell
        run: |
          $ini = Join-Path "${{ steps.path.outputs.files }}" "W10UI.ini"

          (Get-Content $ini) `
          -replace 'Target\s*=.*',"Target=C:\ISO" `
          -replace 'AutoStart\s*=.*',"AutoStart=1" `
          -replace 'ISO\s*=.*',"ISO=1" `
          -replace 'Cleanup\s*=.*',"Cleanup=1" `
          -replace 'ResetBase\s*=.*',"ResetBase=1" `
          -replace 'Rebuild\s*=.*',"Rebuild=1" `
          -replace 'AddUpdates\s*=.*',"AddUpdates=1" `
          -replace 'AddDrivers\s*=.*',"AddDrivers=1" `
          -replace 'wim2esd\s*=.*',"wim2esd=1" `
          -replace 'SkipWinRE\s*=.*',"SkipWinRE=1" `
          | Set-Content $ini

      # LIMPEZA EXTREMA
      - name: Limpeza antes do W10UI
        shell: powershell
        run: |
          dism /Cleanup-Wim
          Remove-Item C:\Windows\Temp\* -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $env:TEMP\* -Recurse -Force -ErrorAction SilentlyContinue
          Get-PSDrive C

      # W10UI (FAZ TUDO)
      - name: Rodar W10UI
        shell: cmd
        working-directory: ${{ steps.path.outputs.files }}
        run: call W10UI.cmd

      # ISO FINAL
      - name: Encontrar ISO
        id: final
        shell: powershell
        run: |
          $iso = Get-ChildItem C:\ -Recurse -Filter *.iso | Sort LastWriteTime -Descending | Select -First 1
          if (!$iso) { throw "ISO não encontrada" }
          "iso=$($iso.FullName)" >> $env:GITHUB_OUTPUT

      # COMPACTAR
      - name: Compactar ISO
        shell: powershell
        run: |
          & "C:\Program Files\7-Zip\7z.exe" a -tzip -v1900m C:\out\ISO.zip "${{ steps.final.outputs.iso }}"

      # LIMPEZA FINAL
      - name: Limpeza final
        shell: powershell
        run: |
          Remove-Item C:\ISO -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item C:\base -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $env:TEMP\* -Recurse -Force -ErrorAction SilentlyContinue

      # RELEASE
      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          tag: win11-abs-${{ github.run_id }}
          name: Win11 PRO FINAL ABSOLUTO
          artifacts: C:\out\ISO.zip*
          token: ${{ github.token }}
