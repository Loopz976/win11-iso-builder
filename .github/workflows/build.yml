name: Teste OSCdimg FIX

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:

      - name: Preparar pastas
        shell: powershell
        run: |
          mkdir C:\work
          mkdir C:\iso

      - name: Criar estrutura fake
        shell: powershell
        run: |
          mkdir C:\iso\boot
          echo TESTE > C:\iso\arquivo.txt
          echo BOOT > C:\iso\boot\etfsboot.com

      - name: Baixar oscdimg portátil
        shell: powershell
        run: |
          curl.exe -L "https://github.com/abbodi1406/vcredist/raw/master/bin/oscdimg.exe" -o C:\work\oscdimg.exe

      - name: Testar criação ISO
        shell: powershell
        run: |
          & "C:\work\oscdimg.exe" `
            -bC:\iso\boot\etfsboot.com `
            -u2 -h -m `
            -lTESTE_ISO `
            C:\iso `
            C:\work\teste.iso

          if (!(Test-Path "C:\work\teste.iso")) {
            throw "ISO não foi criada"
          }

          Write-Host "ISO criada com sucesso!"

      - name: Upload teste
        uses: actions/upload-artifact@v4
        with:
          name: teste-iso
          path: C:\work\teste.iso
