name: Build ISO + Split + Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
    - name: Baixar UUP dump zip (OneDrive fix)
      shell: powershell
      run: |
        $url = "https://1drv.ms/u/c/579080100cd71c41/IQDtC9_-n55VSajuyWiEOvt8AQKL9l00UNtApMK7mvPtKCk"
        $output = "uup.zip"

        $resp = Invoke-WebRequest -Uri $url -MaximumRedirection 10
        $downloadUrl = $resp.Links | Where-Object { $_.href -like "*download*" } | Select-Object -First 1 -ExpandProperty href

        if (-not $downloadUrl) {
          $downloadUrl = $resp.BaseResponse.ResponseUri.AbsoluteUri
        }

        Invoke-WebRequest -Uri $downloadUrl -OutFile $output

    - name: Extrair UUP
      run: powershell -Command "Expand-Archive -Path uup.zip -DestinationPath uup"

    - name: Remover pause
      run: |
        cd uup
        powershell -Command "(Get-Content uup_download_windows.cmd) -replace 'pause','' | Set-Content uup_download_windows.cmd"

    - name: Rodar UUP (gera ISO)
      run: |
        cd uup
        cmd /c uup_download_windows.cmd

    - name: Instalar 7zip
      run: choco install 7zip -y

    - name: Compactar ISO em partes (1900MB)
      run: |
        cd uup
        for %%f in (*.iso) do (
          "C:\Program Files\7-Zip\7z.exe" a -t7z -v1900m -mx=9 split.7z "%%f"
        )

    - name: Listar arquivos finais
      run: dir uup

    - name: Criar Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: iso-build-${{ github.run_id }}
        name: ISO Build ${{ github.run_id }}
        files: uup/split.7z*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
