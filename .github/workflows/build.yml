name: Build Windows 11 23H2 ISO (ESD Oficial)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      # 📁 Preparar ambiente
      - name: Preparar ambiente
        run: |
          mkdir C:\work

      # 📥 Baixar ESD oficial
      - name: Baixar ESD
        run: |
          Invoke-WebRequest -Uri "http://dl.delivery.mp.microsoft.com/filestreamingservice/files/ace9af3d-e652-4ff0-ab99-801b3ff36711/22631.2861.231204-0538.23H2_NI_RELEASE_SVC_REFRESH_CLIENTBUSINESS_VOL_x64FRE_pt-br.esd" -OutFile C:\work\install.esd

      # 📥 Baixar ferramenta wimlib
      - name: Baixar wimlib
        run: |
          Invoke-WebRequest -Uri "https://wimlib.net/downloads/wimlib-1.13.6-windows-x86_64-bin.zip" -OutFile C:\work\wimlib.zip
          Expand-Archive C:\work\wimlib.zip -DestinationPath C:\work\wimlib

      # 🔄 Converter ESD → ISO
      - name: Converter ESD para ISO
        run: |
          cd C:\work

          # Extrair ESD para WIM
          .\wimlib\wimlib-imagex.exe export install.esd 1 install.wim --compress=LZX

          # Criar estrutura ISO
          mkdir iso\sources
          move install.wim iso\sources\install.wim

      # 🔧 Instalar ADK (oscdimg)
      - name: Instalar ADK
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/?linkid=2196224" -OutFile adksetup.exe
          Start-Process adksetup.exe -ArgumentList "/quiet /norestart /features OptionId.DeploymentTools" -Wait

      # 💿 Criar ISO final
      - name: Criar ISO
        run: |
          $oscdimg = "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools\amd64\Oscdimg\oscdimg.exe"
          & $oscdimg -u2 -h -m -lWIN11_23H2 C:\work\iso C:\work\final.iso

      # 📤 Upload
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: C:\work\final.iso
