name: Build Windows 11 Pro ISO

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 1 * *'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Preparar pastas
        run: |
          mkdir C:\iso
          mkdir C:\mount
          mkdir C:\updates
          mkdir C:\drivers\nvidia

      - name: Baixar ISO oficial
        run: |
          Invoke-WebRequest -Uri "https://software-download.microsoft.com/Win11_23H2_BrazilianPortuguese_x64.iso" -OutFile C:\win.iso

      - name: Montar ISO
        run: Mount-DiskImage -ImagePath C:\win.iso

      - name: Copiar arquivos
        run: robocopy D:\ C:\iso /E

      - name: Exportar apenas PRO
        run: |
          dism /Export-Image /SourceImageFile:C:\iso\sources\install.wim /SourceIndex:4 /DestinationImageFile:C:\iso\sources\install.wim

      - name: Montar imagem
        run: |
          dism /Mount-Wim /WimFile:C:\iso\sources\install.wim /index:1 /MountDir:C:\mount

      - name: Baixar driver NVIDIA
        run: |
          Invoke-WebRequest -Uri "https://us.download.nvidia.com/Windows/342.01/342.01-desktop-win10-64bit-international.exe" -OutFile C:\nvidia.exe

      - name: Extrair driver NVIDIA
        run: |
          Start-Process -FilePath C:\nvidia.exe -ArgumentList "-s -extract C:\drivers\nvidia" -Wait

      - name: Integrar driver NVIDIA (com fallback)
        run: |
          try {
            dism /
