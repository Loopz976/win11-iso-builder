name: Teste ISO com wimlib

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:

      - name: Instalar wimlib
        run: choco install wimlib -y

      - name: Preparar estrutura ISO
        shell: powershell
        run: |
          mkdir C:\iso
          echo TESTE > C:\iso\arquivo.txt

      - name: Criar ISO com wimlib
        shell: powershell
        run: |
          wimlib-imagex capture C:\iso C:\work\teste.wim --compress=LZX

          if (!(Test-Path "C:\work\teste.wim")) {
            throw "Falha ao criar imagem"
          }

          Write-Host "WIM criado com sucesso!"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: teste-wim
          path: C:\work\teste.wim
