name: Teste ISO com mkisofs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

      - name: Instalar mkisofs
        run: choco install cdrtools -y

      - name: Preparar estrutura ISO
        shell: powershell
        run: |
          mkdir C:\iso
          mkdir C:\iso\boot

          echo TESTE > C:\iso\arquivo.txt
          echo BOOT > C:\iso\boot\etfsboot.com

      - name: Criar ISO bootável
        shell: powershell
        run: |
          mkisofs `
            -o C:\work\teste.iso `
            -b boot/etfsboot.com `
            -no-emul-boot `
            -boot-load-size 8 `
            -iso-level 3 `
            -udf `
            -J -R `
            C:\iso

          if (!(Test-Path "C:\work\teste.iso")) {
            throw "ISO não foi criada"
          }

          Write-Host "ISO criada com sucesso!"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: teste-iso
          path: C:\work\teste.iso
