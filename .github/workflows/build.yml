name: Build ISO + Split + Release (Local ZIP)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
    - name: Checkout do repositório
      uses: actions/checkout@v4

    - name: Ver arquivos
      run: dir

    - name: Extrair UUP ZIP
      run: |
        powershell -Command "Expand-Archive -Path *.zip -DestinationPath uup"

    - name: Remover pause do script
      run: |
        cd uup
        powershell -Command "(Get-Content uup_download_windows.cmd) -replace 'pause','' | Set-Content uup_download_windows.cmd"

    - name: Rodar UUP (baixar + gerar ISO)
      run: |
        cd uup
        cmd /c uup_download_windows.cmd

    - name: Instalar 7zip
      run: choco install 7zip -y

    - name: Compactar ISO em partes (1900MB)
      run: |
        cd uup
        for %%f in (*.iso) do (
          "C:\Program Files\7-Zip\7z.exe" a -t7z -v1900m -mx=9 split.7z "%%f"
        )

    - name: Listar arquivos finais
      run: dir uup

    - name: Criar Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: iso-build-${{ github.run_id }}
        name: ISO Build ${{ github.run_id }}
        files: uup/split.7z*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
