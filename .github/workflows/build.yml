name: Build Windows ISO (UUP)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    timeout-minutes: 360

    steps:
    - name: Baixar UUP dump zip
      run: |
        curl -L -o uup.zip "https://1drv.ms/u/c/579080100cd71c41/IQDtC9_-n55VSajuyWiEOvt8AQKL9l00UNtApMK7mvPtKCk"

    - name: Extrair UUP
      run: |
        powershell -Command "Expand-Archive -Path uup.zip -DestinationPath uup"

    - name: Ajustar script (anti-travamento)
      run: |
        cd uup
        powershell -Command "(Get-Content uup_download_windows.cmd) -replace 'pause','' | Set-Content uup_download_windows.cmd"

    - name: Rodar UUP (baixar + converter + ISO)
      run: |
        cd uup
        cmd /c uup_download_windows.cmd

    - name: Limpeza para liberar espaço
      run: |
        cd uup
        del /s /q *.esd
        del /s /q *.cab
        del /s /q *.wim

    - name: Listar ISO gerada
      run: dir uup

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: Windows-ISO
        path: uup/*.iso
