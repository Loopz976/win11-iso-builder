name: Build Windows 11 23H2 PRO ISO FINAL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 📁 Preparar ambiente
      - name: Preparar ambiente
        run: |
          mkdir C:\work
          mkdir C:\iso

      # 📥 Baixar partes
      - name: Baixar partes
        run: |
          curl -L "https://github.com/Loopz976/win10-iso-auto-builder/releases/download/files-win11/filesw11.zip.001" -o C:\work\files.zip.001
          curl -L "https://github.com/Loopz976/win10-iso-auto-builder/releases/download/files-win11/filesw11.zip.002" -o C:\work\files.zip.002
          curl -L "https://github.com/Loopz976/win10-iso-auto-builder/releases/download/files-win11/filesw11.zip.003" -o C:\work\files.zip.003
          curl -L "https://github.com/Loopz976/win10-iso-auto-builder/releases/download/files-win11/filesw11.zip.004" -o C:\work\files.zip.004

      # 📦 Extrair pacote (todas partes)
      - name: Extrair pacote
        shell: powershell
        run: |
          & "C:\Program Files\7-Zip\7z.exe" x C:\work\files.zip.001 -oC:\work\extract -y

      # 🔍 Localizar ISO
      - name: Localizar ISO
        shell: powershell
        run: |
          $iso = Get-ChildItem -Path C:\work\extract\Files -Recurse -Filter "Win11*.iso" | Select-Object -First 1

          if (-not $iso) {
            Get-ChildItem -Recurse C:\work\extract
            throw "ISO não encontrada"
          }

          Copy-Item $iso.FullName C:\work\base.iso

      # 📦 Extrair ISO COMPLETA (sem montar)
      - name: Extrair ISO
        shell: powershell
        run: |
          & "C:\Program Files\7-Zip\7z.exe" x C:\work\base.iso -oC:\iso -y

      # 🔍 Detectar imagem
      - name: Detectar install.wim ou esd
        shell: powershell
        run: |
          if (Test-Path "C:\iso\sources\install.wim") {
            echo "IMG=C:\iso\sources\install.wim" >> $env:GITHUB_ENV
          } elseif (Test-Path "C:\iso\sources\install.esd") {
            echo "IMG=C:\iso\sources\install.esd" >> $env:GITHUB_ENV
          } else {
            throw "Imagem não encontrada"
          }

      # 🔄 Exportar index 4 (PRO)
      - name: Exportar PRO
        run: |
          dism /Export-Image /SourceImageFile:$env:IMG /SourceIndex:4 /DestinationImageFile:C:\iso\sources\install_new.wim /Compress:max

      # 🔁 Substituir imagem
      - name: Substituir imagem
        shell: powershell
        run: |
          Remove-Item C:\iso\sources\install.wim -ErrorAction SilentlyContinue
          Remove-Item C:\iso\sources\install.esd -ErrorAction SilentlyContinue
          Rename-Item C:\iso\sources\install_new.wim install.wim

      # 🔧 Instalar ADK
      - name: Instalar ADK
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/?linkid=2196224" -OutFile C:\work\adk.exe
          Start-Process C:\work\adk.exe -ArgumentList "/quiet /norestart /features OptionId.DeploymentTools" -Wait

      # 💿 Criar ISO FINAL
      - name: Criar ISO FINAL
        run: |
          $oscdimg = "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools\amd64\Oscdimg\oscdimg.exe"
          & $oscdimg -bC:\iso\boot\etfsboot.com -u2 -h -m -lWIN11_23H2_PRO_FINAL C:\iso C:\work\Win11_23H2_Pro_Final.iso

      # 📦 Compactar ISO em partes
      - name: Compactar ISO
        shell: powershell
        run: |
          & "C:\Program Files\7-Zip\7z.exe" a -tzip C:\work\Win11_23H2_Pro_Final.zip C:\work\Win11_23H2_Pro_Final.iso -v1900m

      # 📤 Upload
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: win11-23h2-pro-final
          name: Windows 11 23H2 Pro Final ISO
          body: |
            Windows 11 23H2 Pro Final ISO

            - Edition: Professional (Index 4)
            - Clean base
            - Ready for customization
          files: C:\work\Win11_23H2_Pro_Final.zip.*
