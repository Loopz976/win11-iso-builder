name: TESTE W10UI TARGET

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Preparar fake ISO
        shell: powershell
        run: |
          mkdir C:\ISO\sources -Force
          New-Item C:\ISO\sources\install.wim -ItemType File

      - name: Baixar W10UI
        shell: powershell
        run: |
          curl.exe -L -o w10ui.zip https://github.com/abbodi1406/WHD/raw/master/W10UI.zip
          Expand-Archive w10ui.zip -DestinationPath C:\w10ui

      # 🔥 FORÇA VIA VARIÁVEL (SEGREDO AQUI)
      - name: Rodar W10UI FORÇADO
        shell: cmd
        working-directory: C:\w10ui
        run: |
          set "target=C:\ISO"
          set "repo=C:\w10ui"
          set "autostart=1"
          W10UI.cmd
