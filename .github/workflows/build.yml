name: Teste OSCdimg ADK

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:

      - name: Preparar pasta
        shell: powershell
        run: |
          mkdir C:\work
          mkdir C:\iso

      - name: Criar arquivos fake ISO
        shell: powershell
        run: |
          mkdir C:\iso\boot
          echo TESTE > C:\iso\arquivo.txt
          echo BOOT > C:\iso\boot\etfsboot.com

      - name: Baixar ADK oficial
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/?linkid=2196224" -OutFile C:\work\adk.exe

      - name: Instalar Deployment Tools
        shell: powershell
        run: |
          Start-Process C:\work\adk.exe -ArgumentList "/quiet /norestart /features OptionId.DeploymentTools" -Wait

      - name: Localizar oscdimg
        id: find
        shell: powershell
        run: |
          $path = Get-ChildItem "C:\Program Files (x86)\Windows Kits" -Recurse -Filter oscdimg.exe | Select-Object -First 1

          if (-not $path) {
            throw "oscdimg NÃO encontrado"
          }

          echo "path=$($path.FullName)" >> $env:GITHUB_OUTPUT
          Write-Host "oscdimg encontrado em: $($path.FullName)"

      - name: Testar criação ISO
        shell: powershell
        run: |
          $oscdimg = "${{ steps.find.outputs.path }}"

          & $oscdimg `
            -bC:\iso\boot\etfsboot.com `
            -u2 -h -m `
            -lTESTE_ISO `
            C:\iso `
            C:\work\teste.iso

          if (!(Test-Path "C:\work\teste.iso")) {
            throw "ISO NÃO foi criada"
          }

          Write-Host "ISO criada com sucesso!"

      - name: Upload artefato teste
        uses: actions/upload-artifact@v4
        with:
          name: teste-iso
          path: C:\work\teste.iso
