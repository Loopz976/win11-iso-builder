name: Build Windows 11 23H2 PRO BASE ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 📁 Preparar ambiente
      - name: Preparar ambiente
        run: |
          mkdir C:\work
          mkdir C:\work\iso\sources

      # 📥 Baixar ESD PRO (curl - estável)
      - name: Baixar ESD PRO
        shell: powershell
        run: |
          $url = "https://dl.delivery.mp.microsoft.com/filestreamingservice/files/1ae4a20e-24d5-43f0-bcdd-b7d7e6b72864/22631.2861.231204-0538.23H2_NI_RELEASE_SVC_REFRESH_CLIENTCONSUMER_RET_x64FRE_pt-br.esd"
          $output = "C:\work\install.esd"

          curl.exe -L $url -o $output

          if (!(Test-Path $output)) {
            throw "Download falhou"
          }

          if ((Get-Item $output).Length -lt 100MB) {
            throw "Download incompleto"
          }

          Write-Output "Download concluído"

      # 🔍 Detectar index PRO
      - name: Detectar index PRO
        shell: powershell
        run: |
          $info = dism /Get-WimInfo /WimFile:C:\work\install.esd
          $pro = ($info | Select-String "Professional" | Select-Object -First 1)

          if (-not $pro) {
            throw "Não encontrou edição Professional"
          }

          $index = ($pro -split ":")[0] -replace "[^0-9]"
          echo "INDEX=$index" >> $env:GITHUB_ENV

      # 🔄 Converter ESD → WIM
      - name: Converter imagem
        run: |
          dism /Export-Image /SourceImageFile:C:\work\install.esd /SourceIndex:$env:INDEX /DestinationImageFile:C:\work\iso\sources\install.wim /Compress:max

      # 🔧 Instalar ADK (oscdimg)
      - name: Instalar ADK
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/?linkid=2196224" -OutFile C:\work\adk.exe
          Start-Process C:\work\adk.exe -ArgumentList "/quiet /norestart /features OptionId.DeploymentTools" -Wait

      # 💿 Criar ISO BASE
      - name: Criar ISO BASE
        run: |
          $oscdimg = "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools\amd64\Oscdimg\oscdimg.exe"
          & $oscdimg -u2 -h -m -lWIN11_23H2_PRO_BASE C:\work\iso C:\work\win11_pro_base.iso

      # 📤 Upload no Releases
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: base-23h2-pro
          files: C:\work\win11_pro_base.iso
