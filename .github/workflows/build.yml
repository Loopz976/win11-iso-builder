name: TESTE W10UI AUTO PATH

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Criar ISO fake
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path C:\ISO\sources -Force
          New-Item C:\ISO\sources\install.wim -ItemType File

      - name: Instalar 7zip
        run: choco install 7zip -y

      - name: Baixar W10UI
        shell: powershell
        run: |
          curl.exe -L -o w10ui.zip https://codeload.github.com/abbodi1406/WHD/zip/refs/heads/master
          & "C:\Program Files\7-Zip\7z.exe" x w10ui.zip -oC:\ -y

      # 🔥 ENCONTRAR O W10UI.cmd AUTOMATICO
      - name: Encontrar W10UI
        id: find
        shell: powershell
        run: |
          $cmd = Get-ChildItem C:\ -Recurse -Filter W10UI.cmd | Select -First 1
          if (!$cmd) { throw "W10UI.cmd não encontrado" }

          $dir = $cmd.DirectoryName
          echo "dir=$dir" >> $env:GITHUB_OUTPUT

          Write-Host "Encontrado em: $dir"

      - name: Rodar W10UI FORÇADO
        shell: cmd
        working-directory: ${{ steps.find.outputs.dir }}
        run: |
          set "target=C:\ISO"
          set "repo=${{ steps.find.outputs.dir }}"
          set "autostart=1"
          W10UI.cmd
