name: TESTE W10UI FINAL

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Criar ISO fake
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path C:\ISO\sources -Force
          New-Item C:\ISO\sources\install.wim -ItemType File

      - name: Instalar 7zip
        run: choco install 7zip -y

      - name: Baixar W10UI (FIX FINAL)
        shell: powershell
        run: |
          curl.exe -L -o w10ui.zip https://codeload.github.com/abbodi1406/WHD/zip/refs/heads/master

          & "C:\Program Files\7-Zip\7z.exe" x w10ui.zip -oC:\ -y

          Rename-Item "C:\WHD-master" "C:\w10ui"

      - name: Rodar W10UI FORÇADO
        shell: cmd
        working-directory: C:\w10ui\W10UI
        run: |
          set "target=C:\ISO"
          set "repo=C:\w10ui\W10UI"
          set "autostart=1"
          W10UI.cmd
